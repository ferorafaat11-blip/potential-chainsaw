<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Sync</title>
<script src="/socket.io/socket.io.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050810; color:#fff; font-family:sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
h1 { color:#00f5ff; margin:20px 0; font-size:1.5rem; }
.card { background:#0d1117; border:1px solid #00f5ff33; border-radius:16px; padding:20px; width:100%; max-width:600px; margin-bottom:20px; }
input { width:100%; padding:12px; background:#ffffff11; border:1px solid #00f5ff44; border-radius:8px; color:#fff; font-size:1rem; margin-bottom:10px; direction:ltr; }
.btn { padding:12px 24px; border-radius:10px; border:none; font-size:1rem; font-weight:bold; cursor:pointer; margin:5px; }
.play { background:#00f5ff; color:#000; }
.pause { background:#ff006e; color:#fff; }
.stop { background:#333; color:#fff; }
.status { color:#4a5568; font-size:0.85rem; margin-top:10px; text-align:center; }
.dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#22c55e; margin-left:6px; }
iframe { width:100%; aspect-ratio:16/9; border:none; border-radius:10px; margin-top:15px; }
.role-btn { padding:20px 30px; border-radius:12px; border:2px solid #00f5ff44; background:#0d1117; color:#fff; font-size:1rem; cursor:pointer; margin:10px; }
.role-btn:hover { border-color:#00f5ff; }
#hostUI, #viewerUI { display:none; width:100%; max-width:600px; }
</style>
</head>
<body>

<h1>🥽 VR Sync</h1>

<div id="chooseRole" style="text-align:center">
  <p style="color:#4a5568; margin-bottom:20px">اختار دورك</p>
  <button class="role-btn" onclick="startHost()">🎮 مضيف</button>
  <button class="role-btn" onclick="startViewer()">👁️ مشاهد</button>
</div>

<!-- HOST -->
<div id="hostUI">
  <div class="card">
    <p style="color:#00f5ff; margin-bottom:10px">🎮 أنت المضيف</p>
    <input id="urlInput" placeholder="https://youtube.com/watch?v=..." />
    <div style="text-align:center">
      <button class="btn play" onclick="sendPlay()">▶ شغّل الكل</button>
      <button class="btn pause" onclick="sendPause()">⏸ وقّف</button>
      <button class="btn stop" onclick="sendStop()">⏹ إيقاف تام</button>
    </div>
    <div class="status" id="hostStatus"><span class="dot"></span> متصل</div>
  </div>
  <div class="card">
    <p style="color:#4a5568; font-size:0.85rem; margin-bottom:8px">📱 ابعت الرابط ده للمشاهدين:</p>
    <div id="viewerLink" style="color:#00f5ff; font-size:0.8rem; word-break:break-all; direction:ltr; cursor:pointer" onclick="copyLink()"></div>
    <p style="color:#4a5568; font-size:0.75rem; margin-top:5px">اضغط للنسخ 📋</p>
  </div>
</div>

<!-- VIEWER -->
<div id="viewerUI">
  <div class="card" style="text-align:center">
    <p id="viewerStatus" style="color:#4a5568">في انتظار المضيف...</p>
    <div id="playerDiv"></div>
  </div>
</div>

<script>
const socket = io();
let role = null;

function startHost() {
  role = 'host';
  document.getElementById('chooseRole').style.display = 'none';
  document.getElementById('hostUI').style.display = 'block';
  const link = window.location.href + '?viewer=1';
  document.getElementById('viewerLink').textContent = link;
}

function startViewer() {
  role = 'viewer';
  document.getElementById('chooseRole').style.display = 'none';
  document.getElementById('viewerUI').style.display = 'block';
}

// auto viewer from URL
if (new URLSearchParams(window.location.search).get('viewer')) {
  startViewer();
}

function extractId(url) {
  const m = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function sendPlay() {
  const id = extractId(document.getElementById('urlInput').value);
  if (!id) return alert('رابط غلط!');
  socket.emit('play', id);
}

function sendPause() { socket.emit('pause'); }
function sendStop() { socket.emit('stop'); }

function copyLink() {
  navigator.clipboard.writeText(window.location.href + '?viewer=1');
  alert('تم النسخ!');
}

socket.on('state', (state) => {
  if (role !== 'viewer') return;
  const div = document.getElementById('playerDiv');
  if (state.playing && state.videoId) {
    document.getElementById('viewerStatus').textContent = '▶ شغّال';
    div.innerHTML = `<iframe src="https://www.youtube.com/embed/${state.videoId}?autoplay=1" allow="autoplay" allowfullscreen></iframe>`;
  } else if (!state.playing && state.videoId) {
    document.getElementById('viewerStatus').textContent = '⏸ إيقاف مؤقت';
  } else {
    document.getElementById('viewerStatus').textContent = 'في انتظار المضيف...';
    div.innerHTML = '';
  }
});
</script>
</body>
</html>
