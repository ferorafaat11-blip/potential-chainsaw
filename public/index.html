<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR 360</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; }

    #waitScreen {
      position:fixed; inset:0; background:#050810;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:9999; color:#fff;
    }
    .logo { font-size:2rem; font-weight:900; color:#00f5ff; margin-bottom:10px; }
    .wait-text { color:#4a5568; font-size:0.9rem; margin-bottom:30px; }
    .pulse { width:60px; height:60px; border-radius:50%; background:rgba(0,245,255,0.1); border:2px solid #00f5ff; animation:pulse 1.5s infinite; }
    @keyframes pulse {
      0%,100%{box-shadow:0 0 0 0 rgba(0,245,255,0.4);transform:scale(1);}
      50%{box-shadow:0 0 0 20px rgba(0,245,255,0);transform:scale(1.05);}
    }

    /* شاشة اختيار الوضع */
    #modeScreen {
      display:none;
      position:fixed; inset:0; background:#050810;
      flex-direction:column; align-items:center; justify-content:center;
      z-index:9998; gap:20px;
    }
    .mode-title { color:#fff; font-size:1.3rem; font-weight:700; margin-bottom:10px; }
    .mode-btn {
      width:260px; padding:18px; border:none; border-radius:16px;
      font-size:1.1rem; font-weight:900; cursor:pointer;
      display:flex; align-items:center; gap:12px; justify-content:center;
    }
    .mode-normal { background:#fff; color:#000; }
    .mode-vr { background:#00f5ff; color:#000; }
    .mode-desc { font-size:0.75rem; font-weight:400; opacity:0.6; display:block; margin-top:4px; }

    a-scene { width:100vw; height:100vh; }

    /* زرار التبديل أثناء العرض */
    #switchBtn {
      display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      z-index:9997; padding:10px 22px; background:rgba(0,0,0,0.6);
      color:#fff; border:1px solid rgba(255,255,255,0.3);
      font-size:0.85rem; font-weight:700; border-radius:50px; cursor:pointer;
      backdrop-filter:blur(10px);
    }
  </style>
</head>
<body>

<!-- انتظار المضيف -->
<div id="waitScreen">
  <div class="logo">🥽 VR 360</div>
  <div class="wait-text">في انتظار المضيف...</div>
  <div class="pulse"></div>
</div>

<!-- اختيار الوضع -->
<div id="modeScreen">
  <div class="mode-title">اختار وضع العرض</div>
  <button class="mode-btn mode-normal" onclick="startMode('normal')">
    📱 وضع عادي
    <span class="mode-desc">شاشة واحدة</span>
  </button>
  <button class="mode-btn mode-vr" onclick="startMode('vr')">
    🥽 وضع VR
    <span class="mode-desc">شاشتين للنظارة</span>
  </button>
</div>

<!-- زرار التبديل -->
<button id="switchBtn" onclick="showModeScreen()">🔄 غيّر الوضع</button>

<a-scene id="scene"
  vr-mode-ui="enabled:true; cardboardModeEnabled:true"
  device-orientation-permission-ui="enabled:true"
  style="display:none">
  <a-assets>
    <video id="video360" crossorigin="anonymous" loop playsinline webkit-playsinline></video>
  </a-assets>
  <a-videosphere id="videoSphere" src="#video360" rotation="0 180 0" visible="false"></a-videosphere>
  <a-sky id="imageSky" src="" visible="false" radius="100"></a-sky>
  <a-image id="imagePanel" src="" width="3" height="2" position="0 1.6 -3" visible="false"></a-image>
  <a-camera look-controls wasd-controls="enabled:false">
    <a-cursor color="#00f5ff"></a-cursor>
  </a-camera>
</a-scene>

<script>
  const video = document.getElementById('video360');
  const scene = document.getElementById('scene');
  const videoSphere = document.getElementById('videoSphere');
  const imageSky = document.getElementById('imageSky');
  const imagePanel = document.getElementById('imagePanel');
  const socket = io();

  let sceneStarted = false;
  let pendingData = null;
  let currentMode = null; // 'normal' or 'vr'

  // ===== لما المضيف يبدأ =====
  function showModeScreen() {
    scene.style.display = 'none';
    document.getElementById('switchBtn').style.display = 'none';
    document.getElementById('modeScreen').style.display = 'flex';
  }

  function startMode(mode) {
    currentMode = mode;
    document.getElementById('modeScreen').style.display = 'none';
    scene.style.display = 'block';
    document.getElementById('switchBtn').style.display = 'block';

    if (mode === 'vr') {
      scene.enterVR();
    }

    // طبّق الداتا اللي كانت معلّقة
    if (pendingData) applyState(pendingData);
  }

  function hideAll() {
    videoSphere.setAttribute('visible', false);
    imageSky.setAttribute('visible', false);
    imagePanel.setAttribute('visible', false);
    video.pause();
  }

  function applyState(data) {
    hideAll();
    if (data.type === 'video') {
      if (video.src !== data.url) { video.src = data.url; video.load(); }
      videoSphere.setAttribute('visible', true);
      if (data.playing && data.startedAt) {
        const elapsed = (Date.now() - data.startedAt) / 1000;
        video.currentTime = Math.max(0, elapsed);
        video.play().catch(() => { video.muted = true; video.play(); });
      } else {
        if (data.pausedAt) video.currentTime = data.pausedAt;
        video.pause();
      }
    } else if (data.type === 'image360') {
      imageSky.setAttribute('src', data.url);
      imageSky.setAttribute('visible', true);
    } else if (data.type === 'image') {
      imagePanel.setAttribute('src', data.url);
      imagePanel.setAttribute('visible', true);
    }
  }

  function handleState(data) {
    if (!data.url) return;
    pendingData = data;

    if (!sceneStarted) {
      sceneStarted = true;
      document.getElementById('waitScreen').style.display = 'none';
      showModeScreen();
    } else if (currentMode) {
      applyState(data);
    }
  }

  scene.addEventListener('exit-vr', () => {
    currentMode = 'normal';
  });

  socket.on('state', handleState);
  socket.on('sync', handleState);
</script>
</body>
</html>
