<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR 360</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: sans-serif; }

    #startScreen {
      position: fixed;
      inset: 0;
      background: #050810;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      color: #fff;
    }

    .logo {
      font-size: 2rem;
      font-weight: 900;
      color: #00f5ff;
      margin-bottom: 10px;
      letter-spacing: 4px;
    }

    .sub { color: #4a5568; margin-bottom: 40px; font-size: 0.9rem; }

    .start-btn {
      padding: 18px 50px;
      background: #00f5ff;
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      margin-bottom: 15px;
    }

    .vr-btn {
      padding: 14px 40px;
      background: transparent;
      color: #00f5ff;
      border: 2px solid #00f5ff;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 15px;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      padding: 12px 20px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
    }

    #controls button {
      padding: 10px 22px;
      border-radius: 50px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-play { background: #00f5ff; color: #000; }
    .btn-pause { background: #ff006e; color: #fff; }
    .btn-vr { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3) !important; }

    #status {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #00f5ff;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 0.8rem;
      display: none;
      z-index: 100;
    }

    a-scene { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="logo">🥽 VR 360</div>
  <div class="sub">اضغط للبدء</div>
  <button class="start-btn" onclick="startNormal()">▶ تشغيل عادي</button>
  <button class="vr-btn" onclick="startVR()">🥽 وضع VR (نظارة)</button>
</div>

<!-- STATUS -->
<div id="status">⏸ متوقف</div>

<!-- CONTROLS -->
<div id="controls">
  <button class="btn-play" onclick="playVideo()">▶ تشغيل</button>
  <button class="btn-pause" onclick="pauseVideo()">⏸ إيقاف</button>
  <button class="btn-vr" onclick="enterVR()">🥽 VR</button>
</div>

<!-- A-FRAME SCENE -->
<a-scene id="scene" vr-mode-ui="enabled: true" style="display:none">
  <a-assets>
    <video
      id="video360"
      src="https://drive.google.com/uc?export=download&id=1RFhHe0oNGs-joGhYnGfWblSzff5vfHMc"
      crossorigin="anonymous"
      loop
      playsinline
      webkit-playsinline
    ></video>
  </a-assets>

  <a-videosphere src="#video360" rotation="0 180 0"></a-videosphere>

  <a-camera>
    <a-cursor color="#00f5ff"></a-cursor>
  </a-camera>
</a-scene>

<script>
  const video = document.getElementById('video360');
  const scene = document.getElementById('scene');
  const controls = document.getElementById('controls');
  const status = document.getElementById('status');

  function startNormal() {
    document.getElementById('startScreen').style.display = 'none';
    scene.style.display = 'block';
    controls.style.display = 'flex';
    status.style.display = 'block';
    playVideo();
  }

  function startVR() {
    startNormal();
    setTimeout(() => {
      scene.enterVR();
    }, 500);
  }

  function playVideo() {
    video.play();
    status.textContent = '▶ شغّال';
  }

  function pauseVideo() {
    video.pause();
    status.textContent = '⏸ متوقف';
  }

  function enterVR() {
    scene.enterVR();
  }

  // إخفاء الكونترولز لما تدخل VR
  scene.addEventListener('enter-vr', () => {
    controls.style.display = 'none';
    status.style.display = 'none';
  });

  scene.addEventListener('exit-vr', () => {
    controls.style.display = 'flex';
    status.style.display = 'block';
  });
</script>

</body>
</html>
