<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR 360</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; }

    #waitScreen {
      position:fixed; inset:0; background:#050810;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:9999; color:#fff;
    }
    .logo { font-size:2rem; font-weight:900; color:#00f5ff; margin-bottom:10px; }
    .wait-text { color:#4a5568; font-size:0.9rem; margin-bottom:30px; }
    .pulse { width:60px; height:60px; border-radius:50%; background:rgba(0,245,255,0.1); border:2px solid #00f5ff; animation:pulse 1.5s infinite; }
    @keyframes pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(0,245,255,0.4); transform:scale(1); }
      50% { box-shadow:0 0 0 20px rgba(0,245,255,0); transform:scale(1.05); }
    }

    /* زرار VR يدوي لو الأوتوماتيك مش اشتغل */
    #vrBtn {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      z-index:9998; display:none;
      padding:14px 35px; background:#00f5ff; color:#000;
      font-size:1.1rem; font-weight:900; border:none; border-radius:50px;
      cursor:pointer; box-shadow:0 0 20px rgba(0,245,255,0.5);
    }

    a-scene { width:100vw; height:100vh; }
  </style>
</head>
<body>

<div id="waitScreen">
  <div class="logo">🥽 VR 360</div>
  <div class="wait-text">في انتظار المضيف...</div>
  <div class="pulse"></div>
</div>

<button id="vrBtn" onclick="enterVRManual()">🥽 دخول VR</button>

<a-scene
  id="scene"
  vr-mode-ui="enabled:true; cardboardModeEnabled:true"
  device-orientation-permission-ui="enabled:true"
  style="display:none">

  <a-assets>
    <video id="video360" crossorigin="anonymous" loop playsinline webkit-playsinline muted></video>
  </a-assets>

  <a-videosphere id="videoSphere" src="#video360" rotation="0 180 0" visible="false"></a-videosphere>
  <a-sky id="imageSky" src="" visible="false" radius="100"></a-sky>
  <a-image id="imagePanel" src="" width="3" height="2" position="0 1.6 -3" visible="false"></a-image>

  <a-camera look-controls="pointerLockEnabled:false" wasd-controls="enabled:false">
    <a-cursor color="#00f5ff" fuse="false"></a-cursor>
  </a-camera>
</a-scene>

<script>
  const video = document.getElementById('video360');
  const scene = document.getElementById('scene');
  const videoSphere = document.getElementById('videoSphere');
  const imageSky = document.getElementById('imageSky');
  const imagePanel = document.getElementById('imagePanel');
  const vrBtn = document.getElementById('vrBtn');
  const socket = io();
  let sceneStarted = false;

  function showScene() {
    if (sceneStarted) return;
    sceneStarted = true;
    document.getElementById('waitScreen').style.display = 'none';
    scene.style.display = 'block';

    // انتظر A-Frame يجهّز نفسه
    scene.addEventListener('loaded', () => {
      tryEnterVR();
    });

    // لو loaded اتأخر
    setTimeout(tryEnterVR, 1500);
  }

  function tryEnterVR() {
    if (scene.is('vr-mode')) return;

    // جرب enterVR
    const entered = scene.enterVR();
    if (entered && entered.then) {
      entered.then(() => {
        vrBtn.style.display = 'none';
      }).catch(() => {
        // لو فشل اعرض الزرار اليدوي
        vrBtn.style.display = 'block';
      });
    } else {
      // مش promise — اعرض الزرار كـ fallback
      setTimeout(() => {
        if (!scene.is('vr-mode')) vrBtn.style.display = 'block';
      }, 1000);
    }
  }

  function enterVRManual() {
    vrBtn.style.display = 'none';
    scene.enterVR();
  }

  // لو خرج من VR خليه يرجع
  scene.addEventListener('exit-vr', () => {
    setTimeout(() => {
      if (!scene.is('vr-mode')) vrBtn.style.display = 'block';
    }, 500);
  });

  function hideAll() {
    videoSphere.setAttribute('visible', false);
    imageSky.setAttribute('visible', false);
    imagePanel.setAttribute('visible', false);
    video.pause();
  }

  function handleState(data) {
    if (!data.url) return;
    showScene();
    hideAll();

    if (data.type === 'video') {
      if (video.src !== data.url) {
        video.src = data.url;
        video.load();
      }
      videoSphere.setAttribute('visible', true);
      // unmute بعد تفاعل المستخدم
      video.muted = false;
      if (data.playing && data.startedAt) {
        const elapsed = (Date.now() - data.startedAt) / 1000;
        video.currentTime = Math.max(0, elapsed);
        video.play().catch(() => { video.muted = true; video.play(); });
      } else {
        if (data.pausedAt) video.currentTime = data.pausedAt;
        video.pause();
      }

    } else if (data.type === 'image360') {
      imageSky.setAttribute('src', data.url);
      imageSky.setAttribute('visible', true);

    } else if (data.type === 'image') {
      imagePanel.setAttribute('src', data.url);
      imagePanel.setAttribute('visible', true);
    }
  }

  socket.on('state', handleState);
  socket.on('sync', handleState);
</script>
</body>
</html>
