<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR 360</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; font-family:sans-serif; }
    #startScreen {
      position:fixed; inset:0; background:#050810;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:999; color:#fff; padding:20px;
    }
    .logo { font-size:2rem; font-weight:900; color:#00f5ff; margin-bottom:8px; }
    .sub { color:#4a5568; margin-bottom:40px; font-size:0.9rem; }
    .start-btn { padding:16px 50px; background:#00f5ff; color:#000; border:none; border-radius:50px; font-size:1.1rem; font-weight:900; cursor:pointer; margin-bottom:12px; width:220px; }
    .vr-btn { padding:14px 40px; background:transparent; color:#00f5ff; border:2px solid #00f5ff; border-radius:50px; font-size:1rem; font-weight:700; cursor:pointer; width:220px; }

    #controls {
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      display:none; align-items:center; gap:10px; z-index:100;
      background:rgba(0,0,0,0.7); padding:10px 20px;
      border-radius:50px; backdrop-filter:blur(10px);
    }
    #controls button { padding:8px 18px; border-radius:50px; border:none; font-size:0.9rem; font-weight:700; cursor:pointer; }
    .btn-restart { background:#7b2fff; color:#fff; }
    .btn-vr { background:rgba(255,255,255,0.15); color:#fff; }

    /* TIMER على الشاشة */
    #timerDisplay {
      position:fixed; top:15px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.7); color:#00f5ff;
      padding:8px 24px; border-radius:50px;
      font-size:1.3rem; font-family:monospace; font-weight:900;
      display:none; z-index:100; letter-spacing:3px;
      text-shadow:0 0 10px rgba(0,245,255,0.5);
    }

    a-scene { width:100vw; height:100vh; }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="logo">🥽 VR 360</div>
  <div class="sub">اضغط للبدء</div>
  <button class="start-btn" onclick="startNormal()">▶ تشغيل عادي</button>
  <button class="vr-btn" onclick="startVR()">🥽 وضع VR</button>
</div>

<div id="timerDisplay">00:00:00</div>

<div id="controls">
  <button class="btn-restart" onclick="restartVideo()">🔄 من الأول</button>
  <button class="btn-vr" onclick="enterVR()">🥽 VR</button>
</div>

<a-scene id="scene" vr-mode-ui="enabled:true" style="display:none">
  <a-assets>
    <video id="video360"
      src="https://res.cloudinary.com/dqxj0qisf/video/upload/v1772873701/360%C2%BA_virtual_tour_Tabernacle_in_the_times_of_Moses_1_prth6w.mp4"
      crossorigin="anonymous" loop playsinline webkit-playsinline>
    </video>
  </a-assets>
  <a-videosphere src="#video360" rotation="0 180 0"></a-videosphere>
  <a-camera><a-cursor color="#00f5ff"></a-cursor></a-camera>
</a-scene>

<script>
  const video = document.getElementById('video360');
  const scene = document.getElementById('scene');
  const timerEl = document.getElementById('timerDisplay');
  const controls = document.getElementById('controls');
  const socket = io();
  let started = false;
  let timerInterval = null;

  socket.on('state', (data) => {
    if (!started) return;

    // غيّر الفيديو لو اتغير
    if (data.videoUrl && video.getAttribute('src') !== data.videoUrl) {
      video.setAttribute('src', data.videoUrl);
      video.load();
    }

    if (data.playing && data.startedAt) {
      // حساب الوقت الصح بناءً على السيرفر
      const serverNow = data.serverTime || Date.now();
      const clientNow = Date.now();
      const lag = clientNow - serverNow; // فرق التوقيت
      const elapsed = (clientNow - data.startedAt + lag) / 1000;

      video.currentTime = Math.max(0, elapsed);
      video.play();
      startTimer(data.startedAt, data.serverTime);
    } else {
      video.pause();
      if (data.pausedAt !== undefined) {
        video.currentTime = data.pausedAt;
        updateTimerDisplay(data.pausedAt);
      }
      clearInterval(timerInterval);
    }
  });

  function startTimer(startedAt, serverTime) {
    clearInterval(timerInterval);
    const lag = Date.now() - (serverTime || Date.now());
    timerInterval = setInterval(() => {
      const elapsed = (Date.now() - startedAt + lag) / 1000;
      updateTimerDisplay(elapsed);
    }, 100);
  }

  function updateTimerDisplay(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    timerEl.textContent =
      String(h).padStart(2,'0') + ':' +
      String(m).padStart(2,'0') + ':' +
      String(s).padStart(2,'0');
  }

  function startNormal() {
    started = true;
    document.getElementById('startScreen').style.display = 'none';
    scene.style.display = 'block';
    timerEl.style.display = 'block';
    controls.style.display = 'flex';
  }

  function startVR() {
    startNormal();
    setTimeout(() => scene.enterVR(), 500);
  }

  function restartVideo() {
    video.currentTime = 0;
    video.play();
  }

  function enterVR() {
    scene.enterVR();
  }

  scene.addEventListener('enter-vr', () => {
    controls.style.display = 'none';
    timerEl.style.display = 'none';
  });

  scene.addEventListener('exit-vr', () => {
    controls.style.display = 'flex';
    timerEl.style.display = 'block';
  });
</script>
</body>
</html>
