<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR 360</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; }
    #waitScreen {
      position:fixed; inset:0; background:#050810;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:999; color:#fff;
    }
    .logo { font-size:2rem; font-weight:900; color:#00f5ff; margin-bottom:10px; }
    .wait-text { color:#4a5568; font-size:0.9rem; margin-bottom:30px; }
    .pulse { width:60px; height:60px; border-radius:50%; background:rgba(0,245,255,0.1); border:2px solid #00f5ff; animation:pulse 1.5s infinite; }
    @keyframes pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(0,245,255,0.4); transform:scale(1); }
      50% { box-shadow:0 0 0 20px rgba(0,245,255,0); transform:scale(1.05); }
    }
    a-scene { width:100vw; height:100vh; }
  </style>
</head>
<body>

<div id="waitScreen">
  <div class="logo">🥽 VR 360</div>
  <div class="wait-text">في انتظار المضيف...</div>
  <div class="pulse"></div>
</div>

<a-scene id="scene" vr-mode-ui="enabled:true" style="display:none">
  <a-assets id="assets">
    <video id="video360" crossorigin="anonymous" loop playsinline webkit-playsinline></video>
  </a-assets>

  <!-- فيديو 360 -->
  <a-videosphere id="videoSphere" src="#video360" rotation="0 180 0" visible="false"></a-videosphere>

  <!-- صورة 360 -->
  <a-sky id="imageSky" src="" visible="false"></a-sky>

  <!-- صورة عادية (لوحة في الوسط) -->
  <a-image id="imagePanel" src="" width="3" height="2" position="0 1.6 -3" visible="false"></a-image>

  <a-camera><a-cursor color="#00f5ff"></a-cursor></a-camera>
</a-scene>

<script>
  const video = document.getElementById('video360');
  const scene = document.getElementById('scene');
  const videoSphere = document.getElementById('videoSphere');
  const imageSky = document.getElementById('imageSky');
  const imagePanel = document.getElementById('imagePanel');
  const socket = io();
  let sceneStarted = false;
  let currentType = null;

  function showScene() {
    if (!sceneStarted) {
      sceneStarted = true;
      document.getElementById('waitScreen').style.display = 'none';
      scene.style.display = 'block';
      setTimeout(() => scene.enterVR(), 800);
    }
  }

  function hideAll() {
    videoSphere.setAttribute('visible', false);
    imageSky.setAttribute('visible', false);
    imagePanel.setAttribute('visible', false);
    video.pause();
  }

  function handleState(data) {
    if (!data.url) return;
    showScene();
    hideAll();
    currentType = data.type;

    if (data.type === 'video') {
      if (video.getAttribute('src') !== data.url) {
        video.setAttribute('src', data.url);
        video.load();
      }
      videoSphere.setAttribute('visible', true);
      if (data.playing && data.startedAt) {
        const elapsed = (Date.now() - data.startedAt) / 1000;
        video.currentTime = Math.max(0, elapsed);
        video.play().catch(() => {});
      } else {
        if (data.pausedAt) video.currentTime = data.pausedAt;
        video.pause();
      }

    } else if (data.type === 'image360') {
      imageSky.setAttribute('src', data.url);
      imageSky.setAttribute('visible', true);

    } else if (data.type === 'image') {
      imagePanel.setAttribute('src', data.url);
      imagePanel.setAttribute('visible', true);
    }
  }

  socket.on('state', handleState);
  socket.on('sync', handleState);
</script>
</body>
</html>
      padding:8px 24px; border-radius:50px;
      font-size:1.3rem; font-family:monospace; font-weight:900;
      display:none; z-index:100; letter-spacing:3px;
      text-shadow:0 0 10px rgba(0,245,255,0.5);
    }

    a-scene { width:100vw; height:100vh; }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="logo">🥽 VR 360</div>
  <div class="sub">اضغط للبدء</div>
  <button class="start-btn" onclick="startNormal()">▶ تشغيل عادي</button>
  <button class="vr-btn" onclick="startVR()">🥽 وضع VR</button>
</div>

<div id="timerDisplay">00:00:00</div>

<div id="controls">
  <button class="btn-restart" onclick="restartVideo()">🔄 من الأول</button>
  <button class="btn-vr" onclick="enterVR()">🥽 VR</button>
</div>

<a-scene id="scene" vr-mode-ui="enabled:true" style="display:none">
  <a-assets>
    <video id="video360"
      src="https://res.cloudinary.com/dqxj0qisf/video/upload/v1772873701/360%C2%BA_virtual_tour_Tabernacle_in_the_times_of_Moses_1_prth6w.mp4"
      crossorigin="anonymous" loop playsinline webkit-playsinline>
    </video>
  </a-assets>
  <a-videosphere src="#video360" rotation="0 180 0"></a-videosphere>
  <a-camera><a-cursor color="#00f5ff"></a-cursor></a-camera>
</a-scene>

<script>
  const video = document.getElementById('video360');
  const scene = document.getElementById('scene');
  const timerEl = document.getElementById('timerDisplay');
  const controls = document.getElementById('controls');
  const socket = io();
  let started = false;
  let timerInterval = null;

  socket.on('state', (data) => {
    if (!started) return;

    // غيّر الفيديو لو اتغير
    if (data.videoUrl && video.getAttribute('src') !== data.videoUrl) {
      video.setAttribute('src', data.videoUrl);
      video.load();
    }

    if (data.playing && data.startedAt) {
      // حساب الوقت الصح بناءً على السيرفر
      const serverNow = data.serverTime || Date.now();
      const clientNow = Date.now();
      const lag = clientNow - serverNow; // فرق التوقيت
      const elapsed = (clientNow - data.startedAt + lag) / 1000;

      video.currentTime = Math.max(0, elapsed);
      video.play();
      startTimer(data.startedAt, data.serverTime);
    } else {
      video.pause();
      if (data.pausedAt !== undefined) {
        video.currentTime = data.pausedAt;
        updateTimerDisplay(data.pausedAt);
      }
      clearInterval(timerInterval);
    }
  });

  function startTimer(startedAt, serverTime) {
    clearInterval(timerInterval);
    const lag = Date.now() - (serverTime || Date.now());
    timerInterval = setInterval(() => {
      const elapsed = (Date.now() - startedAt + lag) / 1000;
      updateTimerDisplay(elapsed);
    }, 100);
  }

  function updateTimerDisplay(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    timerEl.textContent =
      String(h).padStart(2,'0') + ':' +
      String(m).padStart(2,'0') + ':' +
      String(s).padStart(2,'0');
  }

  function startNormal() {
    started = true;
    document.getElementById('startScreen').style.display = 'none';
    scene.style.display = 'block';
    timerEl.style.display = 'block';
    controls.style.display = 'flex';
  }

  function startVR() {
    startNormal();
    setTimeout(() => scene.enterVR(), 500);
  }

  function restartVideo() {
    video.currentTime = 0;
    video.play();
  }

  function enterVR() {
    scene.enterVR();
  }

  scene.addEventListener('enter-vr', () => {
    controls.style.display = 'none';
    timerEl.style.display = 'none';
  });

  scene.addEventListener('exit-vr', () => {
    controls.style.display = 'flex';
    timerEl.style.display = 'block';
  });
</script>
</body>
</html>
