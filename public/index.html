<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR 360</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin:0; padding:0; }
    body { background:#000; }
    #startScreen {
      position:fixed; inset:0; background:#050810;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:999; color:#fff;
    }
    .logo { font-size:2rem; font-weight:900; color:#00f5ff; margin-bottom:10px; }
    .sub { color:#4a5568; margin-bottom:40px; font-size:0.9rem; }
    .start-btn {
      padding:18px 50px; background:#00f5ff; color:#000;
      border:none; border-radius:50px; font-size:1.2rem;
      font-weight:900; cursor:pointer; margin-bottom:15px;
    }
    .vr-btn {
      padding:14px 40px; background:transparent; color:#00f5ff;
      border:2px solid #00f5ff; border-radius:50px;
      font-size:1rem; font-weight:700; cursor:pointer;
    }
    #status {
      position:fixed; top:15px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:#00f5ff;
      padding:8px 20px; border-radius:50px; font-size:0.8rem;
      display:none; z-index:100;
    }
  </style>
</head>
<body>
<div id="startScreen">
  <div class="logo">🥽 VR 360</div>
  <div class="sub">اضغط للبدء</div>
  <button class="start-btn" onclick="startNormal()">▶ تشغيل عادي</button>
  <button class="vr-btn" onclick="startVR()">🥽 وضع VR</button>
</div>

<div id="status">⏸ متوقف</div>

<a-scene id="scene" vr-mode-ui="enabled:true" style="display:none">
  <a-assets>
    <video id="video360"
      src="https://res.cloudinary.com/dqxj0qisf/video/upload/v1772873701/360%C2%BA_virtual_tour_Tabernacle_in_the_times_of_Moses_1_prth6w.mp4"
      crossorigin="anonymous" loop playsinline webkit-playsinline>
    </video>
  </a-assets>
  <a-videosphere src="#video360" rotation="0 180 0"></a-videosphere>
  <a-camera><a-cursor color="#00f5ff"></a-cursor></a-camera>
</a-scene>

<script>
  const video = document.getElementById('video360');
  const scene = document.getElementById('scene');
  const status = document.getElementById('status');
  const socket = io();
  let started = false;

  socket.on('state', (data) => {
    if (!started) return;
    if (data.playing) {
      video.play();
      status.textContent = '▶ شغّال';
    } else {
      video.pause();
      status.textContent = '⏸ متوقف';
    }
  });

  function startNormal() {
    started = true;
    document.getElementById('startScreen').style.display = 'none';
    scene.style.display = 'block';
    status.style.display = 'block';
  }

  function startVR() {
    startNormal();
    setTimeout(() => scene.enterVR(), 500);
  }
</script>
</body>
</html>
