<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Control</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#050810; color:#fff; font-family:sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:30px 20px; }
    h1 { color:#00f5ff; font-size:1.8rem; margin-bottom:5px; }
    .sub { color:#4a5568; margin-bottom:25px; font-size:0.9rem; }
    .stats-row { display:flex; gap:15px; width:100%; max-width:500px; margin-bottom:20px; }
    .stat-box { flex:1; background:#0d1117; border:1px solid rgba(0,245,255,0.15); border-radius:16px; padding:15px; text-align:center; }
    .stat-num { font-size:2.5rem; font-weight:900; font-family:monospace; }
    .stat-num.cyan { color:#00f5ff; } .stat-num.green { color:#22c55e; }
    .stat-label { color:#4a5568; font-size:0.7rem; letter-spacing:2px; margin-top:4px; }

    /* تايمر */
    .timer-box { background:#0d1117; border:2px solid rgba(0,245,255,0.2); border-radius:20px; padding:18px 20px; margin-bottom:15px; width:100%; max-width:500px; }
    .timer-display { font-size:3rem; font-weight:900; color:#00f5ff; font-family:monospace; letter-spacing:4px; text-align:center; }
    .timer-label { color:#4a5568; font-size:0.7rem; letter-spacing:2px; margin-top:5px; text-align:center; margin-bottom:12px; }
    .seek-row { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .seek-slider { flex:1; accent-color:#00f5ff; cursor:pointer; height:6px; }
    .seek-time { color:#00f5ff; font-size:0.8rem; font-family:monospace; white-space:nowrap; min-width:50px; text-align:center; }
    .manual-seek { display:flex; gap:6px; align-items:center; }
    .manual-seek input {
      flex:1; padding:7px 12px; background:rgba(255,255,255,0.05);
      border:1px solid rgba(0,245,255,0.2); border-radius:8px;
      color:#fff; font-size:0.85rem; direction:ltr; text-align:center;
    }
    .manual-seek input:focus { outline:none; border-color:#00f5ff; }
    .manual-seek input::placeholder { color:#4a5568; }
    .seek-btn { padding:7px 14px; background:#7b2fff; color:#fff; border:none; border-radius:8px; font-size:0.85rem; font-weight:700; cursor:pointer; white-space:nowrap; }

    /* صوت */
    .vol-box { background:#0d1117; border:1px solid rgba(0,245,255,0.15); border-radius:16px; padding:14px 18px; margin-bottom:15px; width:100%; max-width:500px; }
    .vol-row { display:flex; align-items:center; gap:10px; }
    .vol-icon { font-size:1.3rem; cursor:pointer; flex-shrink:0; }
    .vol-slider { flex:1; accent-color:#00f5ff; cursor:pointer; }
    .vol-val { color:#00f5ff; font-size:0.85rem; font-family:monospace; min-width:38px; text-align:center; }
    .mute-btn { padding:7px 14px; background:rgba(255,0,110,0.15); color:#ff006e; border:1px solid rgba(255,0,110,0.3); border-radius:8px; font-size:0.8rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    .mute-btn.muted { background:#ff006e; color:#fff; }

    .main-controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:20px; }
    .btn { padding:13px 22px; border-radius:12px; border:none; font-size:0.9rem; font-weight:900; cursor:pointer; transition:all 0.2s; }
    .btn:active { transform:scale(0.95); }
    .play { background:#00f5ff; color:#000; } .pause { background:#ff006e; color:#fff; }
    .restart { background:#7b2fff; color:#fff; } .sync { background:#f59e0b; color:#000; }

    .section-title { color:#4a5568; font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; width:100%; max-width:500px; }
    .media-list { width:100%; max-width:500px; margin-bottom:15px; }
    .media-item { display:flex; align-items:center; gap:10px; background:#0d1117; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:12px 15px; margin-bottom:8px; transition:all 0.2s; }
    .media-item.active { border-color:#00f5ff; background:rgba(0,245,255,0.06); }
    .media-icon { font-size:1.4rem; flex-shrink:0; }
    .media-info { flex:1; min-width:0; }
    .media-name { font-size:0.9rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .media-meta { font-size:0.7rem; color:#4a5568; margin-top:2px; display:flex; gap:8px; }
    .media-actions { display:flex; gap:6px; flex-shrink:0; }
    .show-btn { padding:6px 12px; background:#00f5ff; color:#000; border:none; border-radius:8px; font-size:0.8rem; font-weight:700; cursor:pointer; }
    .del-btn { padding:6px 10px; background:rgba(255,0,110,0.15); color:#ff006e; border:1px solid rgba(255,0,110,0.3); border-radius:8px; font-size:0.8rem; cursor:pointer; }
    .del-btn:hover { background:rgba(255,0,110,0.3); }
    .empty-msg { color:#4a5568; font-size:0.85rem; text-align:center; padding:20px; }

    .add-box { width:100%; max-width:500px; background:#0d1117; border:1px dashed rgba(0,245,255,0.2); border-radius:12px; padding:18px; margin-bottom:20px; }
    .add-label { color:#4a5568; font-size:0.8rem; margin-bottom:12px; }
    .add-box input { width:100%; padding:10px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(0,245,255,0.2); border-radius:8px; color:#fff; font-size:0.9rem; margin-bottom:8px; direction:ltr; }
    .add-box input:focus { outline:none; border-color:#00f5ff; }
    .add-box input::placeholder { color:#4a5568; }
    .type-row { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
    .type-btn { flex:1; min-width:100px; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:#4a5568; font-size:0.78rem; cursor:pointer; transition:all 0.2s; text-align:center; }
    .type-btn.selected { border-color:#00f5ff; color:#00f5ff; background:rgba(0,245,255,0.08); }
    .dir-box { background:rgba(0,245,255,0.05); border:1px solid rgba(0,245,255,0.15); border-radius:10px; padding:12px; margin-bottom:10px; }
    .dir-label { color:#4a5568; font-size:0.75rem; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
    .dir-label span { color:#00f5ff; font-weight:700; font-size:0.9rem; }
    .dir-compass { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
    .dir-preset { padding:5px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:#4a5568; font-size:0.75rem; cursor:pointer; transition:all 0.2s; }
    .dir-preset:hover { border-color:#00f5ff; color:#00f5ff; }
    .dir-slider { width:100%; accent-color:#00f5ff; cursor:pointer; }
    .add-row { display:flex; gap:8px; }
    .add-btn { padding:10px 18px; background:#7b2fff; color:#fff; border:none; border-radius:8px; font-size:0.9rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    #statusBox { padding:12px 25px; background:#0d1117; border:1px solid rgba(0,245,255,0.15); border-radius:12px; color:#4a5568; font-size:0.85rem; text-align:center; width:100%; max-width:500px; margin-bottom:20px; }
  </style>
</head>
<body>
  <h1>🎮 لوحة التحكم</h1>
  <p class="sub">بتتحكم في كل الأجهزة من هنا</p>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-num green" id="viewerCount">0</div><div class="stat-label">جهاز متصل</div></div>
    <div class="stat-box"><div class="stat-num cyan" id="statusIndicator">⏸</div><div class="stat-label">الحالة</div></div>
  </div>

  <!-- تايمر + seek -->
  <div class="timer-box">
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-label">⏱ التايمر المتزامن</div>
    <div class="seek-row">
      <span class="seek-time">00:00</span>
      <input type="range" class="seek-slider" id="seekSlider" min="0" max="100" value="0" oninput="seekSliderMove(this.value)" onchange="seekSliderDrop(this.value)">
      <span class="seek-time" id="seekEnd">00:00</span>
    </div>
    <div class="manual-seek">
      <input type="text" id="seekInput" placeholder="0:00  أو  1:30  أو  90" />
      <button class="seek-btn" onclick="seekManual()">⏩ اجمب</button>
    </div>
  </div>

  <!-- صوت -->
  <div class="vol-box">
    <div class="vol-row">
      <span class="vol-icon" onclick="toggleMute()">🔊</span>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
      <span class="vol-val" id="volVal">100%</span>
      <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔇 كتم</button>
    </div>
  </div>

  <div class="main-controls">
    <button class="btn play" onclick="sendPlay()">▶ شغّل</button>
    <button class="btn pause" onclick="sendPause()">⏸ وقّف</button>
    <button class="btn restart" onclick="sendRestart()">🔄 من الأول</button>
    <button class="btn sync" onclick="sendSync()">⚡ Sync</button>
  </div>

  <div class="section-title">📁 المحتوى</div>
  <div class="media-list" id="mediaList"></div>

  <div class="add-box">
    <div class="add-label">➕ إضافة محتوى جديد</div>
    <div class="type-row">
      <button class="type-btn selected" id="t_video" onclick="selectType('video')">🌐 فيديو 360°</button>
      <button class="type-btn" id="t_videoFlat" onclick="selectType('videoFlat')">🎬 فيديو عادي</button>
      <button class="type-btn" id="t_image" onclick="selectType('image')">🖼️ صورة عادية</button>
      <button class="type-btn" id="t_image360" onclick="selectType('image360')">🌐 صورة 360°</button>
    </div>
    <input type="text" id="mediaName" placeholder="اسم المحتوى" style="direction:rtl" />
    <input type="text" id="mediaUrl"  placeholder="https://res.cloudinary.com/..." />
    <div class="dir-box">
      <div class="dir-label">🧭 اتجاه بداية الكاميرا <span id="degreeVal">0°</span></div>
      <div class="dir-compass">
        <button class="dir-preset" onclick="setDegree(0)">⬆️ شمال 0°</button>
        <button class="dir-preset" onclick="setDegree(90)">➡️ شرق 90°</button>
        <button class="dir-preset" onclick="setDegree(180)">⬇️ جنوب 180°</button>
        <button class="dir-preset" onclick="setDegree(270)">⬅️ غرب 270°</button>
      </div>
      <input type="range" class="dir-slider" id="degreeSlider" min="0" max="359" value="0" oninput="sliderChanged(this.value)" />
    </div>
    <div class="add-row">
      <button class="add-btn" onclick="addMedia()">➕ إضافة</button>
    </div>
  </div>

  <div id="statusBox">متصل بالسيرفر ✓</div>

  <script>
    const socket = io();
    let currentIndex = 0, selectedType = 'video', selectedDegree = 0;
    let isPlaying = false, startedAt = null, pausedAt = 0;
    let timerInterval = null;
    let isMuted = false, currentVolume = 100;
    let videoDuration = 0; // بيتحدث من الأجهزة أو يدوي
    let isDragging = false;

    const typeIcons  = { video:'🌐', videoFlat:'🎬', image:'🖼️', image360:'🌐' };
    const typeLabels = { video:'فيديو 360°', videoFlat:'فيديو عادي', image:'صورة عادية', image360:'صورة 360°' };

    let mediaList = [
      { name:'جولة المعبد', type:'video', url:'https://res.cloudinary.com/dqxj0qisf/video/upload/v1772873701/360%C2%BA_virtual_tour_Tabernacle_in_the_times_of_Moses_1_prth6w.mp4', degree:0 }
    ];

    // ===== صوت =====
    function setVolume(val) {
      currentVolume = parseInt(val);
      document.getElementById('volVal').textContent = currentVolume + '%';
      document.getElementById('volSlider').value = currentVolume;
      if (currentVolume > 0) isMuted = false;
      updateMuteBtn();
      socket.emit('setVolume', { volume: currentVolume / 100, muted: isMuted });
      setStatus('🔊 الصوت: ' + currentVolume + '%');
    }

    function toggleMute() {
      isMuted = !isMuted;
      updateMuteBtn();
      socket.emit('setVolume', { volume: currentVolume / 100, muted: isMuted });
      setStatus(isMuted ? '🔇 الصوت مكتوم' : '🔊 الصوت شغال');
    }

    function updateMuteBtn() {
      const btn = document.getElementById('muteBtn');
      btn.textContent = isMuted ? '🔊 فك الكتم' : '🔇 كتم';
      btn.classList.toggle('muted', isMuted);
      document.querySelector('.vol-icon').textContent = isMuted ? '🔇' : (currentVolume > 50 ? '🔊' : '🔉');
    }

    // ===== seek slider =====
    function seekSliderMove(val) {
      isDragging = true;
      const secs = (val / 100) * videoDuration;
      document.getElementById('timerDisplay').textContent = formatTime(secs);
    }

    function seekSliderDrop(val) {
      isDragging = false;
      const secs = (val / 100) * videoDuration;
      seekToSeconds(secs);
    }

    function seekManual() {
      const raw = document.getElementById('seekInput').value.trim();
      let secs = 0;
      if (raw.includes(':')) {
        const parts = raw.split(':');
        if (parts.length === 2) secs = parseInt(parts[0]) * 60 + parseFloat(parts[1]);
        else if (parts.length === 3) secs = parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseFloat(parts[2]);
      } else {
        secs = parseFloat(raw);
      }
      if (isNaN(secs)) return alert('اكتب وقت صح! مثلاً: 1:30 أو 90');
      seekToSeconds(secs);
      document.getElementById('seekInput').value = '';
    }

    function seekToSeconds(secs) {
      startedAt = Date.now() - (secs * 1000);
      pausedAt = secs;
      socket.emit('seek', { seconds: secs });
      setStatus('⏩ جمب لـ ' + formatTime(secs));
      if (!isDragging) updateSeekSlider(secs);
    }

    function updateSeekSlider(secs) {
      if (!isDragging && videoDuration > 0) {
        document.getElementById('seekSlider').value = (secs / videoDuration) * 100;
      }
    }

    // ===== اتجاه =====
    function setDegree(val) {
      selectedDegree = val;
      document.getElementById('degreeSlider').value = val;
      document.getElementById('degreeVal').textContent = val + '°';
    }
    function sliderChanged(val) {
      selectedDegree = parseInt(val);
      document.getElementById('degreeVal').textContent = val + '°';
    }

    function selectType(t) {
      selectedType = t;
      ['video','videoFlat','image','image360'].forEach(x => document.getElementById('t_'+x)?.classList.remove('selected'));
      document.getElementById('t_'+t)?.classList.add('selected');
    }

    function compassLabel(deg) {
      if (deg <= 22||deg>=338) return '⬆️ شمال';
      if (deg < 68) return '↗️ شمال شرق';
      if (deg <= 112) return '➡️ شرق';
      if (deg < 158) return '↘️ جنوب شرق';
      if (deg <= 202) return '⬇️ جنوب';
      if (deg < 248) return '↙️ جنوب غرب';
      if (deg <= 292) return '⬅️ غرب';
      return '↖️ شمال غرب';
    }

    function renderMedia() {
      const list = document.getElementById('mediaList');
      if (!mediaList.length) { list.innerHTML = '<div class="empty-msg">مفيش محتوى لسه</div>'; return; }
      list.innerHTML = mediaList.map((m,i) => `
        <div class="media-item ${i===currentIndex?'active':''}">
          <div class="media-icon">${typeIcons[m.type]||'📄'}</div>
          <div class="media-info">
            <div class="media-name">${m.name}</div>
            <div class="media-meta"><span>${typeLabels[m.type]||m.type}</span><span>🧭 ${compassLabel(m.degree||0)} (${m.degree||0}°)</span></div>
          </div>
          <div class="media-actions">
            <button class="show-btn" onclick="showMedia(${i})">▶ عرض</button>
            <button class="del-btn" onclick="deleteMedia(${i})">🗑</button>
          </div>
        </div>`).join('');
    }

    function addMedia() {
      const name = document.getElementById('mediaName').value.trim();
      const url  = document.getElementById('mediaUrl').value.trim();
      if (!name||!url) return alert('حط اسم ورابط!');
      mediaList.push({ name, type:selectedType, url, degree:selectedDegree });
      document.getElementById('mediaName').value = '';
      document.getElementById('mediaUrl').value  = '';
      setDegree(0); renderMedia();
      setStatus('✅ تم إضافة: '+name);
    }

    function deleteMedia(i) {
      const name = mediaList[i].name;
      mediaList.splice(i,1);
      if (currentIndex>=mediaList.length) currentIndex=Math.max(0,mediaList.length-1);
      renderMedia(); setStatus('🗑 تم حذف: '+name);
    }

    function showMedia(i) {
      currentIndex=i; const m=mediaList[i]; renderMedia();
      pausedAt=0; startedAt=Date.now(); isPlaying=true;
      const evt=(m.type==='image'||m.type==='image360')?'show':'restart';
      socket.emit(evt,{url:m.url,type:m.type,degree:m.degree||0,volume:currentVolume/100,muted:isMuted});
      document.getElementById('statusIndicator').textContent='▶';
      startTimer(); setStatus('▶ عرض: '+m.name);
    }

    function sendPlay() {
      if (!mediaList[currentIndex]) return;
      const m=mediaList[currentIndex];
      socket.emit('play',{url:m.url,type:m.type,degree:m.degree||0,volume:currentVolume/100,muted:isMuted});
      isPlaying=true; startedAt=Date.now()-(pausedAt*1000);
      document.getElementById('statusIndicator').textContent='▶';
      startTimer(); setStatus('▶ تم إرسال أمر التشغيل');
    }

    function sendPause() {
      if (startedAt) pausedAt=(Date.now()-startedAt)/1000;
      isPlaying=false; socket.emit('pause');
      document.getElementById('statusIndicator').textContent='⏸';
      setStatus('⏸ تم إرسال أمر الإيقاف');
    }

    function sendRestart() {
      if (!mediaList[currentIndex]) return;
      const m=mediaList[currentIndex];
      socket.emit('restart',{url:m.url,type:m.type,degree:m.degree||0,volume:currentVolume/100,muted:isMuted});
      isPlaying=true; pausedAt=0; startedAt=Date.now();
      document.getElementById('statusIndicator').textContent='▶';
      startTimer(); setStatus('🔄 من الأول');
    }

    function sendSync() { socket.emit('syncAll'); setStatus('⚡ تم مزامنة كل الأجهزة!'); }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!isPlaying||!startedAt) return;
        const secs = (Date.now()-startedAt)/1000;
        if (!isDragging) {
          updateTimerDisplay(secs);
          updateSeekSlider(secs);
        }
      }, 200);
    }

    function updateTimerDisplay(s) {
      if (s<0) s=0;
      document.getElementById('timerDisplay').textContent = formatTime(s);
    }

    function formatTime(s) {
      if (s<0) s=0;
      const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60);
      return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
    }

    function setStatus(msg) { document.getElementById('statusBox').textContent=msg; }

    // استقبال مدة الفيديو من الأجهزة
    socket.on('videoDuration', (data) => {
      if (data.duration > 0) {
        videoDuration = data.duration;
        document.getElementById('seekEnd').textContent = formatTime(data.duration).slice(3); // mm:ss
      }
    });

    socket.on('viewers', c => document.getElementById('viewerCount').textContent=c);
    socket.on('state', data => {
      isPlaying=data.playing; startedAt=data.startedAt; pausedAt=data.pausedAt||0;
      if (!isPlaying) updateTimerDisplay(pausedAt);
    });

    renderMedia(); startTimer();
  </script>
</body>
</html>
