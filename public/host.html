<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #060a12;
      --surface: #0d1520;
      --surface2: #111d2e;
      --border: rgba(0,210,255,0.12);
      --accent: #00d2ff;
      --accent2: #7b2fff;
      --danger: #ff2d6b;
      --warn: #f5a623;
      --text: #e8f4ff;
      --muted: #3d5a7a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* خلفية متحركة */
    body::before {
      content:'';
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(0,210,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(123,47,255,0.05) 0%, transparent 60%);
      pointer-events:none;
    }

    /* HEADER */
    .header {
      position: relative; z-index:10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(6,10,18,0.9);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .header-logo { display:flex; align-items:center; gap:10px; }
    .logo-icon { font-size:1.4rem; }
    .logo-text { font-family:'Space Mono',monospace; font-size:0.9rem; color:var(--accent); letter-spacing:3px; }
    .header-stats { display:flex; gap:20px; align-items:center; }
    .stat-pill {
      display:flex; align-items:center; gap:6px;
      padding:5px 12px; border-radius:20px;
      background:var(--surface2); border:1px solid var(--border);
      font-size:0.78rem; font-family:'Space Mono',monospace;
    }
    .stat-dot { width:7px; height:7px; border-radius:50%; }
    .stat-dot.green { background:#22c55e; box-shadow:0 0 8px #22c55e; animation:blink 2s infinite; }
    .stat-dot.cyan  { background:var(--accent); box-shadow:0 0 8px var(--accent); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .stat-val { color:var(--accent); font-weight:700; }
    .session-btns { display:flex; gap:8px; }
    .sess-btn {
      padding:5px 14px; border-radius:20px; border:none;
      font-size:0.78rem; font-weight:900; cursor:pointer;
      font-family:'Tajawal',sans-serif; transition:all 0.2s;
    }
    .sess-start { background:#22c55e; color:#000; }
    .sess-stop  { background:var(--danger); color:#fff; }
    .sess-btn:active { transform:scale(0.95); }

    /* شاشة الـ room */
    #roomScreen {
      position:fixed; inset:0; z-index:9999;
      background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    }
    .room-logo { font-family:'Space Mono',monospace; font-size:1rem; color:var(--accent); letter-spacing:4px; }
    .room-title { color:var(--text); font-size:1.2rem; font-weight:700; }
    .create-btn {
      padding:14px 40px; background:var(--accent); color:#000;
      border:none; border-radius:12px; font-size:1.1rem; font-weight:900;
      cursor:pointer; font-family:'Tajawal',sans-serif;
    }

    /* كود الـ room في الهيدر */
    .room-code-pill {
      display:flex; align-items:center; gap:8px;
      padding:5px 14px; border-radius:20px;
      background:rgba(0,210,255,0.1); border:1px solid rgba(0,210,255,0.3);
      font-family:'Space Mono',monospace;
    }
    .room-code-label { font-size:0.7rem; color:var(--muted); }
    .room-code-val { font-size:1.3rem; font-weight:700; color:var(--accent); letter-spacing:6px; text-shadow:0 0 15px rgba(0,210,255,0.5); }

    /* MAIN LAYOUT */
    .main {
      position: relative; z-index:5;
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: 12px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* TIMER */
    .timer-panel {
      grid-column: 1; grid-row: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex; align-items: center; gap: 20px;
    }
    .timer-display {
      font-family: 'Space Mono', monospace;
      font-size: 2.4rem; font-weight:700;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(0,210,255,0.4);
      letter-spacing: 3px;
      min-width: 180px;
    }
    .timer-controls { flex:1; display:flex; flex-direction:column; gap:8px; }
    .seek-row { display:flex; align-items:center; gap:8px; }
    .seek-slider {
      flex:1; height:4px; accent-color:var(--accent); cursor:pointer;
      -webkit-appearance:none; appearance:none;
      background: linear-gradient(to right, var(--accent) 0%, var(--surface2) 0%);
      border-radius:2px;
    }
    .seek-label { font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--muted); min-width:40px; }
    .manual-row { display:flex; gap:6px; }
    .mini-input {
      flex:1; padding:5px 10px;
      background:var(--surface2); border:1px solid var(--border);
      border-radius:6px; color:var(--text); font-size:0.8rem;
      direction:ltr; text-align:center;
    }
    .mini-input:focus { outline:none; border-color:var(--accent); }
    .mini-input::placeholder { color:var(--muted); }
    .mini-btn {
      padding:5px 12px; border:none; border-radius:6px;
      font-size:0.78rem; font-weight:700; cursor:pointer;
      font-family:'Tajawal',sans-serif;
    }
    .mini-btn.purple { background:var(--accent2); color:#fff; }
    .mini-btn.cyan   { background:var(--accent); color:#000; }

    /* CONTROLS */
    .controls-panel {
      grid-column: 1; grid-row: 2;
      display: flex; flex-direction: column; gap: 10px;
      min-height: 0;
    }

    /* TRANSPORT */
    .transport {
      display: flex; gap: 8px; flex-wrap:wrap;
    }
    .transport-btn {
      flex:1; min-width:80px; padding:10px 8px;
      border:none; border-radius:10px;
      font-size:0.85rem; font-weight:900;
      cursor:pointer; transition:all 0.15s;
      font-family:'Tajawal',sans-serif;
      display:flex; align-items:center; justify-content:center; gap:5px;
    }
    .transport-btn:active { transform:scale(0.95); }
    .t-play   { background:var(--accent); color:#000; }
    .t-pause  { background:var(--danger); color:#fff; }
    .t-restart{ background:var(--accent2); color:#fff; }
    .t-sync   { background:var(--warn); color:#000; }
    .t-sync.flash { animation:syncFlash 0.4s ease; }
    @keyframes syncFlash { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* VOLUME */
    .vol-panel {
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:10px 16px;
      display:flex; align-items:center; gap:12px;
    }
    .vol-label { font-size:0.75rem; color:var(--muted); white-space:nowrap; }
    .vol-icon { font-size:1.1rem; cursor:pointer; }
    .vol-slider { flex:1; accent-color:var(--accent); cursor:pointer; height:4px; }
    .vol-val { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--accent); min-width:35px; text-align:center; }
    .mute-btn {
      padding:4px 10px; border-radius:6px; border:1px solid rgba(255,45,107,0.3);
      background:rgba(255,45,107,0.1); color:var(--danger);
      font-size:0.75rem; font-weight:700; cursor:pointer; white-space:nowrap;
      font-family:'Tajawal',sans-serif; transition:all 0.2s;
    }
    .mute-btn.muted { background:var(--danger); color:#fff; border-color:var(--danger); }

    /* MEDIA LIST */
    .media-panel {
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; flex:1;
      display:flex; flex-direction:column;
      min-height:0; overflow:hidden;
    }
    .panel-header {
      padding:10px 14px; border-bottom:1px solid var(--border);
      font-size:0.72rem; letter-spacing:2px; color:var(--muted);
      text-transform:uppercase; font-family:'Space Mono',monospace;
      flex-shrink:0;
    }
    .media-scroll { flex:1; overflow-y:auto; padding:8px; }
    .media-scroll::-webkit-scrollbar { width:3px; }
    .media-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .media-item {
      display:flex; align-items:center; gap:8px;
      padding:8px 10px; border-radius:8px;
      border:1px solid transparent;
      margin-bottom:4px; cursor:pointer;
      transition:all 0.15s;
    }
    .media-item:hover { background:var(--surface2); border-color:var(--border); }
    .media-item.active { background:rgba(0,210,255,0.07); border-color:rgba(0,210,255,0.3); }
    .media-icon { font-size:1.1rem; flex-shrink:0; }
    .media-info { flex:1; min-width:0; }
    .media-name { font-size:0.82rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .media-meta { font-size:0.65rem; color:var(--muted); margin-top:1px; display:flex; gap:6px; }
    .media-actions { display:flex; gap:4px; flex-shrink:0; }
    .play-btn {
      padding:4px 10px; background:var(--accent); color:#000;
      border:none; border-radius:6px; font-size:0.72rem; font-weight:700;
      cursor:pointer; font-family:'Tajawal',sans-serif;
    }
    .del-btn {
      padding:4px 7px; background:rgba(255,45,107,0.1); color:var(--danger);
      border:1px solid rgba(255,45,107,0.2); border-radius:6px;
      font-size:0.72rem; cursor:pointer;
    }
    .del-btn:hover { background:rgba(255,45,107,0.25); }
    .empty-msg { color:var(--muted); font-size:0.8rem; text-align:center; padding:20px; }

    /* STATUS */
    .status-bar {
      grid-column: 1; grid-row: 3;
      background:var(--surface); border:1px solid var(--border);
      border-radius:8px; padding:7px 14px;
      font-size:0.78rem; color:var(--muted);
      font-family:'Space Mono',monospace;
      display:flex; align-items:center; gap:8px;
    }
    .status-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }

    /* ADD PANEL (right column) */
    .add-panel {
      grid-column: 2; grid-row: 1 / 4;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .add-panel .panel-header { flex-shrink:0; }
    .add-form { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; }
    .add-form::-webkit-scrollbar { width:3px; }
    .add-form::-webkit-scrollbar-thumb { background:var(--border); }

    .field-label { font-size:0.68rem; color:var(--muted); letter-spacing:1px; margin-bottom:4px; font-family:'Space Mono',monospace; }
    .field-input {
      width:100%; padding:8px 10px;
      background:var(--surface2); border:1px solid var(--border);
      border-radius:7px; color:var(--text); font-size:0.82rem;
      direction:ltr; font-family:'Tajawal',sans-serif;
    }
    .field-input.rtl { direction:rtl; }
    .field-input:focus { outline:none; border-color:var(--accent); }
    .field-input::placeholder { color:var(--muted); }

    /* نوع المحتوى */
    .type-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
    .type-btn {
      padding:7px 4px; border-radius:7px;
      border:1px solid var(--border); background:transparent;
      color:var(--muted); font-size:0.72rem; cursor:pointer;
      transition:all 0.15s; text-align:center;
      font-family:'Tajawal',sans-serif;
    }
    .type-btn.selected { border-color:var(--accent); color:var(--accent); background:rgba(0,210,255,0.08); }

    /* اتجاه */
    .dir-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-bottom:6px; }
    .dir-btn {
      padding:5px; border-radius:6px; border:1px solid var(--border);
      background:transparent; color:var(--muted); font-size:0.7rem;
      cursor:pointer; transition:all 0.15s; text-align:center;
      font-family:'Tajawal',sans-serif;
    }
    .dir-btn:hover { border-color:var(--accent); color:var(--accent); }
    .dir-slider-row { display:flex; align-items:center; gap:6px; }
    .dir-slider { flex:1; accent-color:var(--accent); cursor:pointer; }
    .dir-val { font-family:'Space Mono',monospace; font-size:0.72rem; color:var(--accent); min-width:32px; }

    .add-submit {
      width:100%; padding:10px;
      background: linear-gradient(135deg, var(--accent2), #5a1fd1);
      color:#fff; border:none; border-radius:8px;
      font-size:0.88rem; font-weight:900; cursor:pointer;
      font-family:'Tajawal',sans-serif; transition:all 0.2s;
      margin-top:auto;
    }
    .add-submit:hover { opacity:0.9; transform:translateY(-1px); }

    .divider { height:1px; background:var(--border); margin:2px 0; }
  </style>
</head>
<body>

<!-- شاشة إنشاء الـ Room -->
<div id="roomScreen">
  <div class="room-logo">🥽 VR CONTROL</div>
  <div class="room-title">ابدأ جلسة جديدة</div>
  <button class="create-btn" onclick="createRoom()">➕ إنشاء Room</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <span class="logo-icon">🥽</span>
    <span class="logo-text">VR CONTROL</span>
  </div>
  <div class="header-stats">
    <!-- كود الـ Room -->
    <div class="room-code-pill">
      <span class="room-code-label">كود الدخول</span>
      <span class="room-code-val" id="roomCodeDisplay">--</span>
    </div>
    <div class="session-btns">
      <button class="sess-btn sess-start" onclick="startSession()">▶ ابدأ الجلسة</button>
      <button class="sess-btn sess-stop"  onclick="stopSession()">⏹ وقّف الجلسة</button>
    </div>
    <div class="stat-pill">
      <div class="stat-dot green"></div>
      <span>أجهزة:</span>
      <span class="stat-val" id="viewerCount">0</span>
    </div>
    <div class="stat-pill">
      <div class="stat-dot cyan"></div>
      <span id="statusText">متوقف</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TIMER -->
  <div class="timer-panel">
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-controls">
      <div class="seek-row">
        <span class="seek-label">00:00</span>
        <input type="range" class="seek-slider" id="seekSlider" min="0" max="100" value="0"
          oninput="seekSliderMove(this.value)" onchange="seekSliderDrop(this.value)">
        <span class="seek-label" id="seekEnd">00:00</span>
      </div>
      <div class="manual-row">
        <input class="mini-input" id="seekInput" placeholder="1:30  أو  90 ثانية" />
        <button class="mini-btn purple" onclick="seekManual()">⏩ اجمب</button>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-panel">
    <!-- TRANSPORT -->
    <div class="transport">
      <button class="transport-btn t-play"    onclick="sendPlay()">▶ شغّل</button>
      <button class="transport-btn t-pause"   onclick="sendPause()">⏸ وقّف</button>
      <button class="transport-btn t-restart" onclick="sendRestart()">🔄 من الأول</button>
      <button class="transport-btn t-sync" id="syncBtn" onclick="sendSync()">⚡ Sync</button>
    </div>

    <!-- VOLUME -->
    <div class="vol-panel">
      <span class="vol-label">🔊 صوت</span>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
      <span class="vol-val" id="volVal">100%</span>
      <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔇 كتم</button>
    </div>

    <!-- MEDIA LIST -->
    <div class="media-panel">
      <div class="panel-header">📁 المحتوى</div>
      <div class="media-scroll" id="mediaList"></div>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-bar">
    <div class="status-dot"></div>
    <span id="statusBox">متصل بالسيرفر ✓</span>
  </div>

  <!-- ADD PANEL -->
  <div class="add-panel">
    <div class="panel-header">➕ إضافة محتوى</div>
    <div class="add-form">

      <div>
        <div class="field-label">النوع</div>
        <div class="type-grid">
          <button class="type-btn selected" id="t_video"     onclick="selectType('video')">🌐 فيديو 360°</button>
          <button class="type-btn"          id="t_videoFlat" onclick="selectType('videoFlat')">🎬 فيديو عادي</button>
          <button class="type-btn"          id="t_image"     onclick="selectType('image')">🖼️ صورة عادية</button>
          <button class="type-btn"          id="t_image360"  onclick="selectType('image360')">🌐 صورة 360°</button>
        </div>
      </div>

      <div>
        <div class="field-label">الاسم</div>
        <input class="field-input rtl" id="mediaName" placeholder="اسم المحتوى" />
      </div>

      <div>
        <div class="field-label">الرابط</div>
        <input class="field-input" id="mediaUrl" placeholder="https://..." />
      </div>

      <div>
        <div class="field-label">🧭 اتجاه الكاميرا — <span id="degreeVal" style="color:var(--accent)">0°</span></div>
        <div class="dir-grid">
          <button class="dir-btn" onclick="setDegree(0)">⬆️ شمال</button>
          <button class="dir-btn" onclick="setDegree(90)">➡️ شرق</button>
          <button class="dir-btn" onclick="setDegree(180)">⬇️ جنوب</button>
          <button class="dir-btn" onclick="setDegree(270)">⬅️ غرب</button>
        </div>
        <div class="dir-slider-row">
          <input type="range" class="dir-slider" id="degreeSlider" min="0" max="359" value="0"
            oninput="setDegree(parseInt(this.value))">
          <span class="dir-val" id="degreeSlider_val">0°</span>
        </div>
      </div>

      <button class="add-submit" onclick="addMedia()">➕ إضافة للقائمة</button>
    </div>
  </div>

</div>

<script>
  const socket = io();
  let currentIndex=0, selectedType='video', selectedDegree=0;
  let isPlaying=false, startedAt=null, pausedAt=0;
  let timerInterval=null, isMuted=false, currentVolume=100;
  let videoDuration=0, isDragging=false;
  let myRoomCode = null;

  // ===== Room =====
  function createRoom() {
    socket.emit('createRoom');
  }
  socket.on('roomCreated', (data) => {
    myRoomCode = data.code;
    document.getElementById('roomScreen').style.display = 'none';
    document.getElementById('roomCodeDisplay').textContent = data.code;
    setStatus('✅ تم إنشاء Room — الكود: ' + data.code);
  });

  const typeIcons  = { video:'🌐', videoFlat:'🎬', image:'🖼️', image360:'🌐' };
  const typeLabels = { video:'فيديو 360°', videoFlat:'فيديو عادي', image:'صورة عادية', image360:'صورة 360°' };

  let mediaList = [
    { name:'جولة المعبد', type:'video', degree:0,
      url:'https://res.cloudinary.com/dqxj0qisf/video/upload/v1772873701/360%C2%BA_virtual_tour_Tabernacle_in_the_times_of_Moses_1_prth6w.mp4' }
  ];

  // ===== صوت =====
  function setVolume(val) {
    currentVolume = parseInt(val);
    document.getElementById('volVal').textContent = currentVolume+'%';
    if (currentVolume>0) isMuted=false;
    updateMuteBtn();
    socket.emit('setVolume',{volume:currentVolume/100,muted:isMuted});
    setStatus('🔊 الصوت: '+currentVolume+'%');
  }
  function toggleMute() {
    isMuted=!isMuted; updateMuteBtn();
    socket.emit('setVolume',{volume:currentVolume/100,muted:isMuted});
    setStatus(isMuted?'🔇 الصوت مكتوم':'🔊 الصوت شغال');
  }
  function updateMuteBtn() {
    const btn=document.getElementById('muteBtn');
    btn.textContent=isMuted?'🔊 فك':'🔇 كتم';
    btn.classList.toggle('muted',isMuted);
  }

  // ===== seek =====
  function seekSliderMove(val) {
    isDragging=true;
    const secs=(val/100)*videoDuration;
    document.getElementById('timerDisplay').textContent=formatTime(secs);
    updateSliderFill(val);
  }
  function seekSliderDrop(val) {
    isDragging=false;
    seekToSeconds((val/100)*videoDuration);
  }
  function seekManual() {
    const raw=document.getElementById('seekInput').value.trim();
    let secs=0;
    if (raw.includes(':')) {
      const p=raw.split(':');
      secs = p.length===2 ? parseInt(p[0])*60+parseFloat(p[1]) : parseInt(p[0])*3600+parseInt(p[1])*60+parseFloat(p[2]);
    } else secs=parseFloat(raw);
    if (isNaN(secs)) return alert('اكتب وقت صح! مثلاً: 1:30');
    seekToSeconds(secs);
    document.getElementById('seekInput').value='';
  }
  function seekToSeconds(secs) {
    startedAt=Date.now()-(secs*1000); pausedAt=secs;
    socket.emit('seek',{seconds:secs});
    setStatus('⏩ جمب لـ '+formatTime(secs));
    if (!isDragging) updateSeekSlider(secs);
  }
  function updateSeekSlider(secs) {
    if (!isDragging && videoDuration>0) {
      const pct=(secs/videoDuration)*100;
      document.getElementById('seekSlider').value=pct;
      updateSliderFill(pct);
    }
  }
  function updateSliderFill(pct) {
    document.getElementById('seekSlider').style.background=
      `linear-gradient(to right, var(--accent) ${pct}%, var(--surface2) ${pct}%)`;
  }

  // ===== اتجاه =====
  function setDegree(val) {
    selectedDegree=val;
    document.getElementById('degreeSlider').value=val;
    document.getElementById('degreeVal').textContent=val+'°';
    document.getElementById('degreeSlider_val').textContent=val+'°';
  }

  function selectType(t) {
    selectedType=t;
    ['video','videoFlat','image','image360'].forEach(x=>document.getElementById('t_'+x)?.classList.remove('selected'));
    document.getElementById('t_'+t)?.classList.add('selected');
  }

  function compassLabel(deg) {
    if (deg<=22||deg>=338) return '⬆️ شمال';
    if (deg<68)  return '↗️ ش.شرق';
    if (deg<=112) return '➡️ شرق';
    if (deg<158)  return '↘️ ج.شرق';
    if (deg<=202) return '⬇️ جنوب';
    if (deg<248)  return '↙️ ج.غرب';
    if (deg<=292) return '⬅️ غرب';
    return '↖️ ش.غرب';
  }

  function renderMedia() {
    const list=document.getElementById('mediaList');
    if (!mediaList.length) { list.innerHTML='<div class="empty-msg">لا يوجد محتوى بعد</div>'; return; }
    list.innerHTML=mediaList.map((m,i)=>`
      <div class="media-item ${i===currentIndex?'active':''}" onclick="selectItem(${i})">
        <div class="media-icon">${typeIcons[m.type]||'📄'}</div>
        <div class="media-info">
          <div class="media-name">${m.name}</div>
          <div class="media-meta"><span>${typeLabels[m.type]}</span><span>${compassLabel(m.degree||0)}</span></div>
        </div>
        <div class="media-actions">
          <button class="play-btn" onclick="event.stopPropagation();showMedia(${i})">▶</button>
          <button class="del-btn"  onclick="event.stopPropagation();deleteMedia(${i})">🗑</button>
        </div>
      </div>`).join('');
  }

  function selectItem(i) { currentIndex=i; renderMedia(); }

  function addMedia() {
    const name=document.getElementById('mediaName').value.trim();
    const url=document.getElementById('mediaUrl').value.trim();
    if (!name||!url) return alert('حط اسم ورابط!');
    mediaList.push({name,type:selectedType,url,degree:selectedDegree});
    document.getElementById('mediaName').value='';
    document.getElementById('mediaUrl').value='';
    setDegree(0); renderMedia();
    setStatus('✅ تم إضافة: '+name);
  }

  function deleteMedia(i) {
    const name=mediaList[i].name;
    mediaList.splice(i,1);
    if (currentIndex>=mediaList.length) currentIndex=Math.max(0,mediaList.length-1);
    renderMedia(); setStatus('🗑 تم حذف: '+name);
  }

  function showMedia(i) {
    currentIndex=i; const m=mediaList[i]; renderMedia();
    pausedAt=0; startedAt=Date.now(); isPlaying=true;
    const evt=(m.type==='image'||m.type==='image360')?'show':'restart';
    socket.emit(evt,{url:m.url,type:m.type,degree:m.degree||0,volume:currentVolume/100,muted:isMuted});
    document.getElementById('statusText').textContent='▶ شغّال';
    startTimer(); setStatus('▶ '+m.name+' — '+compassLabel(m.degree||0));
  }

  function sendPlay() {
    if (!mediaList[currentIndex]) return;
    const m=mediaList[currentIndex];
    socket.emit('play',{url:m.url,type:m.type,degree:m.degree||0,volume:currentVolume/100,muted:isMuted});
    isPlaying=true; startedAt=Date.now()-(pausedAt*1000);
    document.getElementById('statusText').textContent='▶ شغّال';
    startTimer(); setStatus('▶ تم التشغيل');
  }
  function sendPause() {
    if (startedAt) pausedAt=(Date.now()-startedAt)/1000;
    isPlaying=false; socket.emit('pause');
    document.getElementById('statusText').textContent='⏸ متوقف';
    setStatus('⏸ تم الإيقاف');
  }
  function sendRestart() {
    if (!mediaList[currentIndex]) return;
    const m=mediaList[currentIndex];
    socket.emit('restart',{url:m.url,type:m.type,degree:m.degree||0,volume:currentVolume/100,muted:isMuted});
    isPlaying=true; pausedAt=0; startedAt=Date.now();
    document.getElementById('statusText').textContent='▶ شغّال';
    startTimer(); setStatus('🔄 من الأول');
  }
  function sendSync() {
    socket.emit('syncAll');
    const btn=document.getElementById('syncBtn');
    btn.classList.add('flash');
    setTimeout(()=>btn.classList.remove('flash'),400);
    setStatus('⚡ تم مزامنة كل الأجهزة');
  }

  function startTimer() {
    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
      if (!isPlaying||!startedAt) return;
      const secs=(Date.now()-startedAt)/1000;
      if (!isDragging) { updateTimerDisplay(secs); updateSeekSlider(secs); }
    },200);
  }
  function updateTimerDisplay(s) {
    if (s<0) s=0;
    document.getElementById('timerDisplay').textContent=formatTime(s);
  }
  function formatTime(s) {
    if(s<0)s=0;
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  }
  function setStatus(msg) { document.getElementById('statusBox').textContent=msg; }

  function startSession() {
    socket.emit('startSession');
    setStatus('▶ تم إرسال أمر بدء الجلسة');
  }
  function stopSession() {
    socket.emit('stopSession');
    isPlaying=false; startedAt=null; pausedAt=0;
    updateTimerDisplay(0);
    document.getElementById('statusText').textContent='⏹ متوقف';
    setStatus('⏹ تم إيقاف الجلسة — الأجهزة في الانتظار');
  }

  socket.on('videoDuration',(data)=>{
    if(data.duration>0){
      videoDuration=data.duration;
      const mm=Math.floor((data.duration%3600)/60), ss=Math.floor(data.duration%60);
      document.getElementById('seekEnd').textContent=String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
    }
  });
  socket.on('viewers',c=>document.getElementById('viewerCount').textContent=c);
  socket.on('state',data=>{
    isPlaying=data.playing; startedAt=data.startedAt; pausedAt=data.pausedAt||0;
    if(!isPlaying) updateTimerDisplay(pausedAt);
  });

  renderMedia(); startTimer();
</script>
</body>
</html>
