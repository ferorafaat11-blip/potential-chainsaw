<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Control</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg:#060a12; --s1:#0d1520; --s2:#111d2e;
  --br:rgba(0,210,255,0.12); --ac:#00d2ff; --ac2:#7b2fff;
  --red:#ff2d6b; --warn:#f5a623; --grn:#22c55e;
  --tx:#e8f4ff; --mu:#3d5a7a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Tajawal',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 40% at 80% 20%,rgba(0,210,255,0.06) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 10% 80%,rgba(123,47,255,0.05) 0%,transparent 60%);pointer-events:none;}

/* HEADER */
.hdr{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--br);background:rgba(6,10,18,0.95);backdrop-filter:blur(20px);flex-shrink:0;gap:10px;flex-wrap:wrap;}
.logo{font-family:'Space Mono',monospace;font-size:0.85rem;color:var(--ac);letter-spacing:3px;}
.hdr-stats{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.spill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;background:var(--s2);border:1px solid var(--br);font-size:0.72rem;font-family:'Space Mono',monospace;}
.dot{width:6px;height:6px;border-radius:50%;}
.dot.g{background:var(--grn);box-shadow:0 0 6px var(--grn);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-btns{display:flex;gap:6px;flex-wrap:wrap;}
.hb{padding:5px 11px;border-radius:14px;border:none;font-size:0.73rem;font-weight:900;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;}
.hb:active{transform:scale(.95);}
.hb.start{background:var(--grn);color:#000;}
.hb.stop{background:var(--red);color:#fff;}
.hb.kick{background:rgba(255,45,107,.15);color:var(--red);border:1px solid rgba(255,45,107,.3);}
.hb.kick:hover{background:var(--red);color:#fff;}

/* LAYOUT */
.main{position:relative;z-index:5;display:grid;grid-template-columns:1fr 290px;grid-template-rows:auto auto 1fr auto;gap:10px;padding:10px;flex:1;}

/* TIMER */
.timer-card{grid-column:1;grid-row:1;background:var(--s1);border:1px solid var(--br);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:14px;}
.timer{font-family:'Space Mono',monospace;font-size:2rem;font-weight:700;color:var(--ac);text-shadow:0 0 20px rgba(0,210,255,.4);letter-spacing:3px;min-width:150px;}
.tctl{flex:1;display:flex;flex-direction:column;gap:7px;}
.srow{display:flex;align-items:center;gap:6px;}
.sslider{flex:1;height:4px;accent-color:var(--ac);cursor:pointer;border-radius:2px;}
.slbl{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--mu);min-width:34px;}
.mrow{display:flex;gap:5px;}
.mi{flex:1;padding:5px 8px;background:var(--s2);border:1px solid var(--br);border-radius:6px;color:var(--tx);font-size:.76rem;direction:ltr;text-align:center;}
.mi:focus{outline:none;border-color:var(--ac);}
.mi::placeholder{color:var(--mu);}
.mb{padding:5px 9px;border:none;border-radius:6px;font-size:.73rem;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;background:var(--ac2);color:#fff;}

/* TRANSPORT + VOLUME */
.ctrl-row{grid-column:1;grid-row:2;display:flex;flex-direction:column;gap:8px;}
.transport{display:flex;gap:6px;flex-wrap:wrap;}
.tb{flex:1;min-width:68px;padding:9px 5px;border:none;border-radius:9px;font-size:.8rem;font-weight:900;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;}
.tb:active{transform:scale(.95);}
.t-pl{background:var(--ac);color:#000;} .t-pa{background:var(--red);color:#fff;}
.t-re{background:var(--ac2);color:#fff;} .t-sy{background:var(--warn);color:#000;}
.t-sy.flash{animation:fl .4s;}
@keyframes fl{0%,100%{opacity:1}50%{opacity:.2}}

/* VIDEO + AUDIO VOLUMES */
.vol-audio-row{display:flex;gap:8px;}
.vpanel{flex:1;background:var(--s1);border:1px solid var(--br);border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:8px;}
.vlbl{font-size:.7rem;color:var(--mu);white-space:nowrap;}
.vsl{flex:1;accent-color:var(--ac);cursor:pointer;height:4px;}
.vval{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--ac);min-width:32px;text-align:center;}
.muteb{padding:3px 8px;border-radius:5px;border:1px solid rgba(255,45,107,.3);background:rgba(255,45,107,.1);color:var(--red);font-size:.7rem;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;}
.muteb.on{background:var(--red);color:#fff;}

/* AUDIO CONTROLS */
.audio-card{background:var(--s1);border:1px solid rgba(123,47,255,.3);border-radius:9px;padding:10px 12px;display:flex;flex-direction:column;gap:7px;}
.audio-hdr{font-size:.68rem;color:var(--ac2);letter-spacing:2px;font-family:'Space Mono',monospace;}
.audio-timer{font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--ac2);text-shadow:0 0 15px rgba(123,47,255,.5);letter-spacing:2px;}
.audio-row{display:flex;gap:5px;align-items:center;}
.audio-url{flex:1;padding:6px 8px;background:var(--s2);border:1px solid var(--br);border-radius:6px;color:var(--tx);font-size:.75rem;direction:ltr;}
.audio-url:focus{outline:none;border-color:var(--ac2);}
.audio-url::placeholder{color:var(--mu);}
.abt{padding:5px 10px;border:none;border-radius:6px;font-size:.73rem;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;}
.abt:active{transform:scale(.95);}
.ab-pl{background:var(--ac2);color:#fff;} .ab-pa{background:var(--mu);color:#fff;} .ab-re{background:#3d2080;color:#fff;} .ab-sy{background:var(--warn);color:#000;} .ab-st{background:rgba(255,45,107,.2);color:var(--red);}
.asl{flex:1;height:4px;accent-color:var(--ac2);cursor:pointer;border-radius:2px;}
.aslbl{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--mu);min-width:30px;}
.amuteb{padding:3px 7px;border-radius:5px;border:1px solid rgba(123,47,255,.4);background:rgba(123,47,255,.1);color:var(--ac2);font-size:.7rem;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;}
.amuteb.on{background:var(--ac2);color:#fff;}

/* MEDIA LIST */
.media-card{grid-column:1;grid-row:3;background:var(--s1);border:1px solid var(--br);border-radius:9px;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.card-hdr{padding:8px 12px;border-bottom:1px solid var(--br);font-size:.66rem;letter-spacing:2px;color:var(--mu);font-family:'Space Mono',monospace;flex-shrink:0;}
.mscroll{flex:1;overflow-y:auto;padding:6px;}
.mscroll::-webkit-scrollbar{width:3px;} .mscroll::-webkit-scrollbar-thumb{background:var(--br);}
.mitem{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;border:1px solid transparent;margin-bottom:3px;transition:all .15s;cursor:pointer;}
.mitem:hover{background:var(--s2);border-color:var(--br);}
.mitem.active{background:rgba(0,210,255,.07);border-color:rgba(0,210,255,.3);}
.mic{font-size:.95rem;flex-shrink:0;}
.min{flex:1;min-width:0;}
.mname{font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mmeta{font-size:.6rem;color:var(--mu);margin-top:1px;display:flex;gap:5px;}
.macts{display:flex;gap:3px;}
.pbtn{padding:3px 8px;background:var(--ac);color:#000;border:none;border-radius:5px;font-size:.68rem;font-weight:700;cursor:pointer;}
.dbtn{padding:3px 6px;background:rgba(255,45,107,.1);color:var(--red);border:1px solid rgba(255,45,107,.2);border-radius:5px;font-size:.68rem;cursor:pointer;}
.empty{color:var(--mu);font-size:.78rem;text-align:center;padding:20px;}

/* STATUS BAR */
.sbar{grid-column:1;grid-row:4;background:var(--s1);border:1px solid var(--br);border-radius:7px;padding:6px 12px;font-size:.7rem;color:var(--mu);font-family:'Space Mono',monospace;display:flex;align-items:center;gap:6px;}

/* RIGHT COL */
.rcol{grid-column:2;grid-row:1/5;display:flex;flex-direction:column;gap:8px;min-height:0;}

/* VIEWERS */
.viewers-card{background:var(--s1);border:1px solid var(--br);border-radius:10px;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;}
.vscroll{flex:1;overflow-y:auto;padding:4px;}
.vscroll::-webkit-scrollbar{width:3px;} .vscroll::-webkit-scrollbar-thumb{background:var(--br);}
.vitem{display:flex;align-items:center;gap:7px;padding:6px 10px;border-bottom:1px solid rgba(0,210,255,.04);}
.vnum{width:20px;height:20px;border-radius:50%;background:var(--s2);border:1px solid var(--br);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-family:'Space Mono',monospace;color:var(--mu);flex-shrink:0;}
.sbadge{padding:2px 7px;border-radius:9px;font-size:.62rem;font-weight:700;}
.sw{background:rgba(61,90,122,.3);color:var(--mu);}
.sc{background:rgba(245,166,35,.2);color:var(--warn);}
.sn{background:rgba(34,197,94,.2);color:var(--grn);}
.sv{background:rgba(0,210,255,.15);color:var(--ac);}

/* ADD PANEL */
.add-card{background:var(--s1);border:1px solid var(--br);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.aform{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;max-height:340px;}
.aform::-webkit-scrollbar{width:3px;} .aform::-webkit-scrollbar-thumb{background:var(--br);}
.fl{font-size:.63rem;color:var(--mu);letter-spacing:1px;margin-bottom:3px;font-family:'Space Mono',monospace;}
.fi{width:100%;padding:6px 8px;background:var(--s2);border:1px solid var(--br);border-radius:6px;color:var(--tx);font-size:.78rem;direction:ltr;}
.fi.r{direction:rtl;}
.fi:focus{outline:none;border-color:var(--ac);}
.fi::placeholder{color:var(--mu);}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.tyb{padding:5px 3px;border-radius:6px;border:1px solid var(--br);background:transparent;color:var(--mu);font-size:.68rem;cursor:pointer;text-align:center;font-family:'Tajawal',sans-serif;}
.tyb.sel{border-color:var(--ac);color:var(--ac);background:rgba(0,210,255,.08);}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:4px;}
.dbt{padding:4px;border-radius:5px;border:1px solid var(--br);background:transparent;color:var(--mu);font-size:.63rem;cursor:pointer;font-family:'Tajawal',sans-serif;}
.dbt:hover{border-color:var(--ac);color:var(--ac);}
.drow{display:flex;align-items:center;gap:5px;}
.dsl{flex:1;accent-color:var(--ac);}
.dv{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--ac);min-width:26px;}
.asub{width:100%;padding:8px;background:linear-gradient(135deg,var(--ac2),#5a1fd1);color:#fff;border:none;border-radius:7px;font-size:.82rem;font-weight:900;cursor:pointer;font-family:'Tajawal',sans-serif;}

/* RESPONSIVE MOBILE */
@media(max-width:700px){
  .main{grid-template-columns:1fr;grid-template-rows:auto auto auto auto auto;}
  .timer-card{grid-column:1;grid-row:1;}
  .ctrl-row{grid-column:1;grid-row:2;}
  .media-card{grid-column:1;grid-row:3;min-height:180px;}
  .sbar{grid-column:1;grid-row:4;}
  .rcol{grid-column:1;grid-row:5;flex-direction:row;flex-wrap:wrap;min-height:unset;}
  .viewers-card{flex:1;min-width:200px;min-height:150px;}
  .add-card{flex:1;min-width:200px;}
  .timer{font-size:1.4rem;min-width:110px;}
  .hdr{justify-content:center;}
  .hdr-btns{justify-content:center;}
}
</style>
</head>
<body>

<div class="hdr">
  <span class="logo">🥽 VR</span>
  <div class="hdr-stats">
    <div class="spill"><div class="dot g"></div><span id="vCount">0</span> جهاز</div>
    <div class="spill" id="statusPill">متوقف</div>
  </div>
  <div class="hdr-btns">
    <button class="hb start" onclick="startSession()">▶ ابدأ</button>
    <button class="hb stop"  onclick="stopSession()">⏹ وقّف</button>
    <button class="hb kick"  onclick="kickAll()">🚪 أخرج الكل</button>
  </div>
</div>

<div class="main">

  <!-- TIMER -->
  <div class="timer-card">
    <div class="timer" id="timerDisp">00:00:00</div>
    <div class="tctl">
      <div class="srow">
        <span class="slbl">00:00</span>
        <input type="range" class="sslider" id="seekSl" min="0" max="100" value="0"
          oninput="seekMove(this.value)" onchange="seekDrop(this.value)">
        <span class="slbl" id="seekEnd">00:00</span>
      </div>
      <div class="mrow">
        <input class="mi" id="seekIn" placeholder="1:30 أو 90" />
        <button class="mb" onclick="seekManual()">⏩</button>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="ctrl-row">
    <div class="transport">
      <button class="tb t-pl" onclick="sendPlay()">▶ شغّل</button>
      <button class="tb t-pa" onclick="sendPause()">⏸ وقّف</button>
      <button class="tb t-re" onclick="sendRestart()">🔄 أول</button>
      <button class="tb t-sy" id="syncBtn" onclick="sendSync()">⚡ Sync</button>
    </div>

    <!-- VIDEO VOLUME + AUDIO VOLUME -->
    <div class="vol-audio-row">
      <div class="vpanel">
        <span class="vlbl">🎬</span>
        <input type="range" class="vsl" id="volSl" min="0" max="100" value="100" oninput="setVolume(this.value)">
        <span class="vval" id="volVal">100%</span>
        <button class="muteb" id="muteBtn" onclick="toggleMute()">🔇</button>
      </div>
    </div>

    <!-- AUDIO CARD -->
    <div class="audio-card">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="audio-hdr">🎵 صوت منفصل</div>
        <div class="audio-timer" id="audioTimerDisp">00:00:00</div>
      </div>
      <!-- رابط -->
      <div class="audio-row">
        <input class="audio-url" id="audioUrl" placeholder="رابط الصوت mp3..." />
      </div>
      <!-- seek -->
      <div class="audio-row">
        <span class="aslbl">00:00</span>
        <input type="range" class="asl" id="audioSeekSl" min="0" max="100" value="0"
          oninput="audioSeekMove(this.value)" onchange="audioSeekDrop(this.value)">
        <span class="aslbl" id="audioSeekEnd">00:00</span>
      </div>
      <!-- أزرار -->
      <div class="audio-row">
        <button class="abt ab-pl" onclick="playAudio()">▶</button>
        <button class="abt ab-pa" onclick="pauseAudio()">⏸</button>
        <button class="abt ab-re" onclick="restartAudio()">🔄</button>
        <button class="abt ab-sy" onclick="syncAudio()">⚡</button>
        <button class="abt ab-st" onclick="stopAudio()">⏹</button>
      </div>
      <!-- صوت -->
      <div class="audio-row">
        <span class="aslbl">🔊</span>
        <input type="range" class="asl" id="audioVolSl" min="0" max="100" value="100" oninput="setAudioVol(this.value)">
        <span class="vval" id="audioVolVal">100%</span>
        <button class="amuteb" id="audioMuteBtn" onclick="toggleAudioMute()">🔇</button>
      </div>
    </div>
  </div>

  <!-- MEDIA -->
  <div class="media-card">
    <div class="card-hdr">📁 المحتوى</div>
    <div class="mscroll" id="mediaList"></div>
  </div>

  <!-- STATUS -->
  <div class="sbar"><div class="dot" style="background:var(--ac)"></div><span id="statusBox">متصل ✓</span></div>

  <!-- RIGHT -->
  <div class="rcol">
    <div class="viewers-card">
      <div class="card-hdr">👥 الأجهزة</div>
      <div class="vscroll" id="viewerList"></div>
    </div>
    <div class="add-card">
      <div class="card-hdr">➕ إضافة</div>
      <div class="aform">
        <div>
          <div class="fl">النوع</div>
          <div class="tgrid">
            <button class="tyb sel" id="t_video"     onclick="selType('video')">🌐 360°</button>
            <button class="tyb"     id="t_videoFlat" onclick="selType('videoFlat')">🎬 عادي</button>
            <button class="tyb"     id="t_image"     onclick="selType('image')">🖼️ صورة</button>
            <button class="tyb"     id="t_image360"  onclick="selType('image360')">🌐 ص360</button>
          </div>
        </div>
        <div><div class="fl">الاسم</div><input class="fi r" id="mName" placeholder="اسم المحتوى"/></div>
        <div><div class="fl">الرابط</div><input class="fi" id="mUrl" placeholder="https://..."/></div>
        <div>
          <div class="fl">🧭 الاتجاه — <span id="degVal" style="color:var(--ac)">0°</span></div>
          <div class="dgrid">
            <button class="dbt" onclick="setDeg(0)">⬆️ شمال</button>
            <button class="dbt" onclick="setDeg(90)">➡️ شرق</button>
            <button class="dbt" onclick="setDeg(180)">⬇️ جنوب</button>
            <button class="dbt" onclick="setDeg(270)">⬅️ غرب</button>
          </div>
          <div class="drow">
            <input type="range" class="dsl" id="degSl" min="0" max="359" value="0" oninput="setDeg(+this.value)">
            <span class="dv" id="degSv">0°</span>
          </div>
        </div>
        <button class="asub" onclick="addMedia()">➕ إضافة</button>
      </div>
    </div>
  </div>

</div>

<script>
const socket = io();
let ci=0, selType_='video', selDeg=0;
let playing=false, startedAt=null, pausedAt=0;
let timer=null, muted=false, vol=100, audioVol=100;
let dur=0, dragging=false;

const TI={video:'🌐',videoFlat:'🎬',image:'🖼️',image360:'🌐'};
const TL={video:'فيديو 360°',videoFlat:'فيديو عادي',image:'صورة عادية',image360:'صورة 360°'};

let ml=[{name:'جولة المعبد',type:'video',degree:0,url:'https://res.cloudinary.com/dqxj0qisf/video/upload/v1772873701/360%C2%BA_virtual_tour_Tabernacle_in_the_times_of_Moses_1_prth6w.mp4'}];

// ===== صوت الفيديو =====
function setVolume(v){vol=+v;document.getElementById('volVal').textContent=v+'%';if(v>0)muted=false;updMute();socket.emit('setVolume',{volume:v/100,muted});}
function toggleMute(){muted=!muted;updMute();socket.emit('setVolume',{volume:vol/100,muted});}
function updMute(){const b=document.getElementById('muteBtn');b.textContent=muted?'🔊':'🔇';b.classList.toggle('on',muted);}

// ===== صوت منفصل =====
let audioPlaying=false, audioStartedAt=null, audioPausedAt=0, audioDur=0, audioDragging=false, audioMuted=false;
let audioTimer=null;

function playAudio(){
  const u=document.getElementById('audioUrl').value.trim();
  if(!u)return st('حط رابط الصوت!');
  socket.emit('playAudio',{url:u,volume:audioVol/100,muted:audioMuted});
  audioPlaying=true; audioStartedAt=Date.now()-(audioPausedAt*1000);
  startAudioTimer(); st('🎵 شغّل الصوت');
}
function pauseAudio(){
  if(audioStartedAt) audioPausedAt=(Date.now()-audioStartedAt)/1000;
  audioPlaying=false; socket.emit('pauseAudio'); st('🎵 وقّف الصوت');
}
function restartAudio(){
  const u=document.getElementById('audioUrl').value.trim();
  if(!u)return st('حط رابط الصوت!');
  socket.emit('restartAudio',{url:u,volume:audioVol/100,muted:audioMuted});
  audioPlaying=true; audioPausedAt=0; audioStartedAt=Date.now();
  startAudioTimer(); st('🔄 الصوت من الأول');
}
function syncAudio(){socket.emit('syncAll');st('⚡ Sync الصوت');}
function stopAudio(){
  socket.emit('stopAudio'); audioPlaying=false; audioPausedAt=0; audioStartedAt=null;
  updAudioTimer(0); st('⏹ أوقف الصوت');
}
function setAudioVol(v){audioVol=+v;document.getElementById('audioVolVal').textContent=v+'%';socket.emit('setAudioVolume',{volume:v/100,muted:audioMuted});}
function toggleAudioMute(){audioMuted=!audioMuted;const b=document.getElementById('audioMuteBtn');b.textContent=audioMuted?'🔊':'🔇';b.classList.toggle('on',audioMuted);socket.emit('setAudioVolume',{volume:audioVol/100,muted:audioMuted});}

function audioSeekMove(v){audioDragging=true;updAudioTimerDisp((v/100)*audioDur);}
function audioSeekDrop(v){audioDragging=false;audioSeekTo((v/100)*audioDur);}
function audioSeekTo(s){
  audioStartedAt=Date.now()-(s*1000); audioPausedAt=s;
  socket.emit('seekAudio',{seconds:s}); st('⏩ صوت '+fmtA(s));
}

function startAudioTimer(){
  clearInterval(audioTimer);
  audioTimer=setInterval(()=>{
    if(!audioPlaying||!audioStartedAt)return;
    const s=(Date.now()-audioStartedAt)/1000;
    if(!audioDragging){updAudioTimer(s);}
  },200);
}
function updAudioTimer(s){
  if(s<0)s=0;
  updAudioTimerDisp(s);
  if(audioDur>0&&!audioDragging) document.getElementById('audioSeekSl').value=(s/audioDur)*100;
}
function updAudioTimerDisp(s){document.getElementById('audioTimerDisp').textContent=fmtA(s);}
function fmtA(s){if(s<0)s=0;return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0');}

socket.on('audioDuration',d=>{if(d.duration>0){audioDur=d.duration;const m=Math.floor((d.duration%3600)/60),s=Math.floor(d.duration%60);document.getElementById('audioSeekEnd').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}});

// ===== seek =====
function seekMove(v){dragging=true;document.getElementById('timerDisp').textContent=fmt((v/100)*dur);}
function seekDrop(v){dragging=false;seekTo((v/100)*dur);}
function seekManual(){const r=document.getElementById('seekIn').value.trim();let s=0;if(r.includes(':')){{const p=r.split(':');s=p.length===2?+p[0]*60+ +p[1]:+p[0]*3600+ +p[1]*60+ +p[2];}}else s=+r;if(isNaN(s))return alert('وقت غلط!');seekTo(s);document.getElementById('seekIn').value='';}
function seekTo(s){startedAt=Date.now()-(s*1000);pausedAt=s;socket.emit('seek',{seconds:s});st('⏩ '+fmt(s));if(!dragging)updSeek(s);}
function updSeek(s){if(!dragging&&dur>0){document.getElementById('seekSl').value=(s/dur)*100;}}

// ===== تحكم =====
function sendPlay(){if(!ml[ci])return;const m=ml[ci];socket.emit('play',{url:m.url,type:m.type,degree:m.degree||0,volume:vol/100,muted});playing=true;startedAt=Date.now()-(pausedAt*1000);startTimer();st('▶ تشغيل');document.getElementById('statusPill').textContent='▶ شغّال';}
function sendPause(){if(startedAt)pausedAt=(Date.now()-startedAt)/1000;playing=false;socket.emit('pause');st('⏸ متوقف');document.getElementById('statusPill').textContent='⏸ متوقف';}
function sendRestart(){if(!ml[ci])return;const m=ml[ci];socket.emit('restart',{url:m.url,type:m.type,degree:m.degree||0,volume:vol/100,muted});playing=true;pausedAt=0;startedAt=Date.now();startTimer();st('🔄 من الأول');}
function sendSync(){socket.emit('syncAll');const b=document.getElementById('syncBtn');b.classList.add('flash');setTimeout(()=>b.classList.remove('flash'),400);st('⚡ Sync');}
function startSession(){socket.emit('startSession');st('▶ بدأت الجلسة');}
function stopSession(){socket.emit('stopSession');playing=false;startedAt=null;pausedAt=0;updTimer(0);st('⏹ وقّفت الجلسة');document.getElementById('statusPill').textContent='⏹ متوقف';}
function kickAll(){if(confirm('هتطرد كل الأجهزة؟')){socket.emit('kickAll');st('🚪 تم طرد الكل');}}

// ===== الأجهزة =====
function scls(s){return s==='انتظار'?'sw':s==='اختيار وضع'?'sc':s==='عادي'?'sn':'sv';}
socket.on('viewerList',list=>{
  const el=document.getElementById('viewerList');
  if(!list.length){el.innerHTML='<div class="empty">لا يوجد أجهزة</div>';return;}
  el.innerHTML=list.map(v=>`<div class="vitem"><div class="vnum">${v.num}</div><span class="sbadge ${scls(v.status)}">${v.status}</span></div>`).join('');
});
socket.on('viewers',c=>document.getElementById('vCount').textContent=c);

// ===== ميديا =====
function selType(t){selType_=t;['video','videoFlat','image','image360'].forEach(x=>document.getElementById('t_'+x)?.classList.remove('sel'));document.getElementById('t_'+t)?.classList.add('sel');}
function setDeg(v){selDeg=v;document.getElementById('degSl').value=v;document.getElementById('degVal').textContent=v+'°';document.getElementById('degSv').textContent=v+'°';}
function cmp(d){if(d<=22||d>=338)return'⬆️';if(d<68)return'↗️';if(d<=112)return'➡️';if(d<158)return'↘️';if(d<=202)return'⬇️';if(d<248)return'↙️';if(d<=292)return'⬅️';return'↖️';}
function renderML(){
  const el=document.getElementById('mediaList');
  if(!ml.length){el.innerHTML='<div class="empty">لا يوجد محتوى</div>';return;}
  el.innerHTML=ml.map((m,i)=>`<div class="mitem ${i===ci?'active':''}" onclick="ci=${i};renderML()">
    <div class="mic">${TI[m.type]}</div>
    <div class="min"><div class="mname">${m.name}</div><div class="mmeta"><span>${TL[m.type]}</span><span>${cmp(m.degree||0)} ${m.degree||0}°</span></div></div>
    <div class="macts"><button class="pbtn" onclick="event.stopPropagation();showM(${i})">▶</button><button class="dbtn" onclick="event.stopPropagation();delM(${i})">🗑</button></div>
  </div>`).join('');
}
function addMedia(){const n=document.getElementById('mName').value.trim(),u=document.getElementById('mUrl').value.trim();if(!n||!u)return alert('حط اسم ورابط!');ml.push({name:n,type:selType_,url:u,degree:selDeg});document.getElementById('mName').value='';document.getElementById('mUrl').value='';setDeg(0);renderML();st('✅ '+n);}
function delM(i){ml.splice(i,1);if(ci>=ml.length)ci=Math.max(0,ml.length-1);renderML();}
function showM(i){ci=i;const m=ml[i];renderML();pausedAt=0;startedAt=Date.now();playing=true;const e=(m.type==='image'||m.type==='image360')?'show':'restart';socket.emit(e,{url:m.url,type:m.type,degree:m.degree||0,volume:vol/100,muted});startTimer();st('▶ '+m.name);}

// ===== تايمر =====
function startTimer(){clearInterval(timer);timer=setInterval(()=>{if(!playing||!startedAt)return;const s=(Date.now()-startedAt)/1000;if(!dragging){updTimer(s);updSeek(s);}},200);}
function updTimer(s){if(s<0)s=0;document.getElementById('timerDisp').textContent=fmt(s);}
function fmt(s){if(s<0)s=0;return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0');}
function st(m){document.getElementById('statusBox').textContent=m;}

socket.on('videoDuration',d=>{if(d.duration>0){dur=d.duration;const m=Math.floor((d.duration%3600)/60),s=Math.floor(d.duration%60);document.getElementById('seekEnd').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}});
socket.on('state',d=>{playing=d.playing;startedAt=d.startedAt;pausedAt=d.pausedAt||0;if(!playing)updTimer(pausedAt);});

renderML(); startTimer();
</script>
</body>
</html>
