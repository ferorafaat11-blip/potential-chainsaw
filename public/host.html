<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Control</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#050810; color:#fff;
      font-family:sans-serif; min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:20px;
    }
    h1 { color:#00f5ff; font-size:1.8rem; margin-bottom:10px; }
    .sub { color:#4a5568; margin-bottom:50px; font-size:0.9rem; }
    .btn {
      width:200px; padding:18px;
      border-radius:16px; border:none;
      font-size:1.2rem; font-weight:900;
      cursor:pointer; margin:10px;
      transition:all 0.2s;
    }
    .play { background:#00f5ff; color:#000; }
    .pause { background:#ff006e; color:#fff; }
    .play:hover { box-shadow:0 0 30px rgba(0,245,255,0.5); }
    .pause:hover { box-shadow:0 0 30px rgba(255,0,110,0.5); }
    #statusBox {
      margin-top:30px; padding:15px 30px;
      background:#0d1117; border:1px solid #00f5ff33;
      border-radius:12px; color:#4a5568; font-size:0.9rem;
    }
    .dot {
      display:inline-block; width:10px; height:10px;
      border-radius:50%; background:#22c55e; margin-left:8px;
    }
  </style>
</head>
<body>
  <h1>🎮 لوحة التحكم</h1>
  <p class="sub">بتتحكم في كل الأجهزة من هنا</p>

  <button class="btn play" onclick="sendPlay()">▶ شغّل الكل</button>
  <button class="btn pause" onclick="sendPause()">⏸ وقّف الكل</button>

  <div id="statusBox">
    <span class="dot"></span> متصل بالسيرفر
  </div>

  <script>
    const socket = io();

    function sendPlay() {
      socket.emit('play');
      document.getElementById('statusBox').innerHTML = '<span class="dot"></span> تم إرسال أمر التشغيل ▶';
    }

    function sendPause() {
      socket.emit('pause');
      document.getElementById('statusBox').innerHTML = '<span class="dot" style="background:#ff006e"></span> تم إرسال أمر الإيقاف ⏸';
    }
  </script>
</body>
</html>
